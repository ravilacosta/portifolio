
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ràvila Costa — Space Portfolio AAA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;overflow:hidden;font-family:'Exo 2',sans-serif;cursor:none;}
  #canvas-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
  #ui-layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;}
  #hud-name{position:fixed;top:28px;left:36px;font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:#fff;text-shadow:0 0 20px #00f7ff,0 0 40px #00f7ff88;letter-spacing:4px;pointer-events:none;}
  #hud-sub{font-family:'Exo 2',sans-serif;font-size:12px;font-weight:300;color:#00f7ffaa;letter-spacing:6px;margin-top:4px;}
  #hud-coords{position:fixed;top:28px;right:36px;font-family:'Orbitron',sans-serif;font-size:11px;color:#00f7ff88;text-align:right;letter-spacing:2px;}
  #instructions{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);font-family:'Exo 2',sans-serif;font-size:13px;color:#ffffff88;letter-spacing:3px;text-align:center;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
  #planet-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:420px;max-width:90vw;background:rgba(0,0,0,.92);border:1px solid #00f7ff55;border-radius:20px;padding:36px 32px;z-index:100;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:all;box-shadow:0 0 60px #00f7ff33, inset 0 0 60px #0008;}
  #planet-modal.open{transform:translate(-50%,-50%) scale(1);}
  #modal-planet-visual{width:80px;height:80px;border-radius:50%;margin:0 auto 20px;box-shadow:0 0 30px var(--planet-color,#ff6b35);background:radial-gradient(circle at 35% 35%, #fff2, var(--planet-color,#ff6b35) 60%, #0008);position:relative;}
  #modal-planet-visual::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid var(--planet-color,#ff6b35);opacity:.4;animation:orbit-ring 3s linear infinite;}
  @keyframes orbit-ring{to{transform:rotate(360deg) scaleX(2.2) scaleY(.6);}}
  #modal-title{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:#fff;text-align:center;margin-bottom:8px;letter-spacing:2px;}
  #modal-desc{font-size:13px;color:#ffffffaa;text-align:center;line-height:1.7;margin-bottom:24px;letter-spacing:.5px;}
  #modal-btn{display:block;width:100%;padding:14px;background:transparent;border:1px solid var(--planet-color,#ff6b35);border-radius:10px;color:var(--planet-color,#ff6b35);font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all .3s;text-decoration:none;text-align:center;}
  #modal-btn:hover{background:var(--planet-color,#ff6b35);color:#000;box-shadow:0 0 30px var(--planet-color,#ff6b35);}
  #modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#ffffff66;font-size:22px;cursor:pointer;transition:color .2s;}
  #modal-close:hover{color:#fff;}
  #cursor{position:fixed;width:12px;height:12px;border-radius:50%;background:#00f7ff;box-shadow:0 0 12px #00f7ff;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;}
  #cursor-ring{position:fixed;width:36px;height:36px;border-radius:50%;border:1px solid #00f7ff66;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .12s ease;}
  #mobile-controls{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);gap:12px;z-index:200;pointer-events:all;}
  .mob-btn{width:54px;height:54px;border-radius:50%;background:rgba(0,247,255,.12);border:1px solid #00f7ff55;color:#00f7ff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;}
  @media(max-width:700px){#mobile-controls{display:flex;}#instructions{display:none;}body{cursor:auto;}#cursor,#cursor-ring{display:none;}}
</style>
</head>
<body>
<canvas id="canvas-bg"></canvas>
<div id="cursor"></div><div id="cursor-ring"></div>
<div id="hud-name">RÀVILA COSTA<div id="hud-sub">BACKEND DEVELOPER · EXPLORER</div></div>
<div id="hud-coords"><div id="coord-x">X: 0.0</div><div id="coord-y">Y: 0.0</div><div id="coord-z">SECTOR: ALPHA</div></div>
<div id="instructions">← → MOVER · ESPAÇO PULAR · APROXIME-SE DOS PLANETAS</div>
<div id="planet-modal">
  <button id="modal-close">×</button>
  <div id="modal-planet-visual"></div>
  <div id="modal-title">PROJETO</div>
  <div id="modal-desc">Descrição do projeto</div>
  <a id="modal-btn" href="#" target="_blank">VER NO GITHUB →</a>
</div>
<div id="mobile-controls">
  <button class="mob-btn" id="btn-left">◀</button>
  <button class="mob-btn" id="btn-jump">▲</button>
  <button class="mob-btn" id="btn-right">▶</button>
</div>

<!-- ─── THREE.JS ES MODULES ─── -->
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { EffectComposer } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

// ── RENDERER & SCENE ──
const canvas = document.getElementById('canvas-bg');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);
scene.fog = new THREE.FogExp2(0x000010, 0.008);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(0, 4, 18);

// ── LIGHTS ──
scene.add(new THREE.AmbientLight(0x111133,1.5));
const sunLight = new THREE.PointLight(0x4488ff,3,200); sunLight.position.set(-30,20,0); scene.add(sunLight);
const fillLight = new THREE.PointLight(0xff2266,1.5,100); fillLight.position.set(30,-10,10); scene.add(fillLight);

// ── STARS ──
function makeStars(count, spread, size, color){
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  for(let i=0;i<count*3;i++) pos[i]=(Math.random()-0.5)*spread;
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat = new THREE.PointsMaterial({size,color,transparent:true,opacity:.9,sizeAttenuation:true});
  return new THREE.Points(geo,mat);
}
scene.add(makeStars(3000,400,0.18,0xffffff));
scene.add(makeStars(800,300,0.35,0x88ddff));
scene.add(makeStars(400,200,0.5,0xffcc44));

// ── PLANETS DATA ──
const PROJECTS = [
  {name:"FRONT EVENTOS", desc:"Interface frontend para gerenciamento e divulgação de eventos.", url:"https://github.com/ravilacosta/front-eventos.git", color:"#ff6b35", size:2.2, rings:true, x:60},
  {name:"SHOPEE CLONE", desc:"Recriação da plataforma Shopee.", url:"https://github.com/ravilacosta/shopee.git", color:"#ff3d7f", size:1.9, rings:false, x:130},
  {name:"LOJA VIRTUAL", desc:"Loja virtual completa com catálogo e fluxo de compra.", url:"https://github.com/ravilacosta/loja-virtual.git", color:"#7c3aed", size:2.5, rings:true, x:210}
];
const planets=[], planetMeshes=[];

// ── CREATE PLANETS ──
PROJECTS.forEach(proj=>{
  const group = new THREE.Group(); group.position.set(proj.x,2,-12);
  const geo = new THREE.SphereGeometry(proj.size,64,64);
  const mat = new THREE.MeshStandardMaterial({color:proj.color,emissive:proj.color,emissiveIntensity:.25,roughness:.6,metalness:.3});
  const sphere = new THREE.Mesh(geo,mat); group.add(sphere);

  if(proj.rings){
    const ring = new THREE.Mesh(new THREE.TorusGeometry(proj.size*1.7,.18,4,80), new THREE.MeshBasicMaterial({color:proj.color,transparent:true,opacity:.6}));
    ring.rotation.x=Math.PI/3; group.add(ring);
    const ring2 = new THREE.Mesh(new THREE.TorusGeometry(proj.size*2.1,.08,4,80), new THREE.MeshBasicMaterial({color:proj.color,transparent:true,opacity:.3}));
    ring2.rotation.x=Math.PI/3; group.add(ring2);
  }

  scene.add(group); planets.push({group, proj, sphere});
  planetMeshes.push(sphere);
});

// ── ASTRONAUT ──
const astronautGroup = new THREE.Group(); scene.add(astronautGroup);
const bodyMat = new THREE.MeshStandardMaterial({color:0xffffff,roughness:.6,metalness:.2,emissive:0x111122,emissiveIntensity:.5});
const body = new THREE.Mesh(new THREE.CapsuleGeometry(.35,.6,8,16),bodyMat); body.position.y=.6; astronautGroup.add(body);
const helm = new THREE.Mesh(new THREE.SphereGeometry(.35,32,32), bodyMat); helm.position.y=1.3; astronautGroup.add(helm);
astronautGroup.position.set(0,-1,0);

// ── MODAL ──
const modal=document.getElementById('planet-modal');
const modalTitle=document.getElementById('modal-title');
const modalDesc=document.getElementById('modal-desc');
const modalBtn=document.getElementById('modal-btn');
document.getElementById('modal-close').addEventListener('click',()=>modal.classList.remove('open'));
function openModal(proj){ modalTitle.textContent=proj.name; modalDesc.textContent=proj.desc; modalBtn.href=proj.url; modal.style.setProperty('--planet-color',proj.color); modal.classList.add('open'); }

// ── CURSOR ──
const cur=document.getElementById('cursor'); const curR=document.getElementById('cursor-ring');
window.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px'; curR.style.left=e.clientX+'px'; curR.style.top=e.clientY+'px';});

// ── INPUT ──
const keys={};
window.addEventListener('keydown',e=>keys[e.code]=true);
window.addEventListener('keyup',e=>keys[e.code]=false);

// ── RAYCASTER ──
const raycaster=new THREE.Raycaster(); const mouse=new THREE.Vector2();
window.addEventListener('click',e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(planetMeshes);
  if(hits.length>0) openModal(PROJECTS[planetMeshes.indexOf(hits[0].object)]);
});

// ── POSTPROCESSING ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),1.2,0.4,0.85));

// ── ANIMATION ──
const clock = new THREE.Clock();
let astX=0, astY=-1, astVY=0;
const GROUND_Y=-1, GRAVITY=-.018, JUMP=.28, SPEED=.08;

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();

  // movement
  if(keys['ArrowLeft']||keys['KeyA']) astX-=SPEED;
  if(keys['ArrowRight']||keys['KeyD']) astX+=SPEED;
  if((keys['Space']||keys['ArrowUp']||keys['KeyW']) && astY<=GROUND_Y+.02) astVY=JUMP;
  astVY+=GRAVITY; astY+=astVY;
  if(astY<GROUND_Y) astY=GROUND_Y, astVY=0;
  astX=Math.max(-5,Math.min(280,astX));
  astronautGroup.position.x=astX; astronautGroup.position.y=astY;

  // camera
  camera.position.x+=(astX-camera.position.x)*.06;
  camera.position.z+=(18-camera.position.z)*.06;
  camera.position.y+=(5-camera.position.y)*.04;
  camera.lookAt(astX,1.5,0);

  // HUD
  const sectorNames=["ALPHA","BETA","GAMMA","DELTA","EPSILON","ZETA"];
  document.getElementById('coord-x').textContent=`X: ${astX.toFixed(1)}`;
  document.getElementById('coord-y').textContent=`Y: ${astY.toFixed(2)}`;
  document.getElementById('coord-z').textContent=`SECTOR: ${sectorNames[Math.floor(astX/50)%sectorNames.length]}`;

  composer.render();
}
animate();

// ── RESIZE ──
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
