
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfólio AAA - Astronauta</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  #info {
    position: absolute; top: 10px; left: 10px;
    color: #0ff; font-family: monospace;
    text-shadow: 0 0 10px #0ff;
  }
</style>
</head>
<body>

<div id="info">
  RÀVILA COSTA<br />
  INTERACTIVE SPACE PORTFOLIO
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
  // Setup básico da cena
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Objeto exemplo: uma esfera representando planeta
  const geometry = new THREE.SphereGeometry(1, 32, 32);
  const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.7, roughness: 0.1 });
  const planet = new THREE.Mesh(geometry, material);
  scene.add(planet);

  // Luzes
  const light1 = new THREE.PointLight(0x00ffff, 1);
  light1.position.set(5, 5, 5);
  scene.add(light1);

  const ambient = new THREE.AmbientLight(0x222222);
  scene.add(ambient);

  // Pós-processamento: Bloom
  const composer = new THREE.EffectComposer(renderer);
  const renderPass = new THREE.RenderPass(scene, camera);
  composer.addPass(renderPass);

  const bloomPass = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.5, 0.4, 0.85
  );
  composer.addPass(bloomPass);

  // Animação
  function animate() {
    requestAnimationFrame(animate);
    planet.rotation.y += 0.005;
    composer.render();
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
