<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ràvila Costa • Portfólio</title>
<style>
body { margin:0; overflow:hidden; background:#030008; }

.hud {
  position: fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div class="hud">
  <h1>🚀 Ràvila Costa</h1>
  <p>Backend Developer • Portfólio Espacial</p>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

// CENA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// PLANETAS
const projects = [
  { color: 0xff6b35, x: -4, url: "https://github.com/ravilacosta/front-eventos" },
  { color: 0xff3d3d, x: 0, url: "https://github.com/ravilacosta/shopee" },
  { color: 0xa855f7, x: 4, url: "https://github.com/ravilacosta/loja-virtual" }
];

const planets = [];

projects.forEach(p => {
  const geo = new THREE.SphereGeometry(1.2, 32, 32);
  const mat = new THREE.MeshStandardMaterial({ color: p.color });
  const mesh = new THREE.Mesh(geo, mat);

  mesh.position.x = p.x;
  mesh.userData.url = p.url;

  scene.add(mesh);
  planets.push(mesh);
});

// CLIQUE
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", (event) => {
  mouse.x = (event.clientX / innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(planets);

  if (intersects.length > 0) {
    window.open(intersects[0].object.userData.url, "_blank");
  }
});

// ANIMAÇÃO
camera.position.z = 8;

function animate() {
  requestAnimationFrame(animate);

  planets.forEach(p => p.rotation.y += 0.01);

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
