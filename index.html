<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ràvila Costa | Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Marquee Animation */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: 200%;
            animation: marquee 20s linear infinite;
        }

        /* Gradiente Fluido Seção 3 */
        .gradient-bg {
            background: linear-gradient(-45deg, #dcfce7, #dbeafe, #ffffff, #f0fdf4);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Celulares subindo */
        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
        .phone-column {
            animation: scrollUp 15s linear infinite;
        }
        
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-white text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { motion, AnimatePresence } = FramerMotion;

        const App = () => {
            return (
                <div className="w-full">
                    {/* SEÇÃO 1: HERO */}
                    <section className="relative h-screen w-full flex items-center justify-center overflow-hidden">
                        {/* Fundo Dividido */}
                        <div className="absolute inset-0 flex">
                            <div className="w-1/2 h-full bg-[#f0fdf4]"></div> {/* Verde Suave */}
                            <div className="w-1/2 h-full bg-[#eff6ff]"></div> {/* Azul Suave */}
                        </div>

                        {/* Foto Central */}
                        <motion.div 
                            initial={{ opacity: 0, scale: 0.8 }}
                            whileInView={{ opacity: 1, scale: 1 }}
                            transition={{ duration: 1, ease: "easeOut" }}
                            className="relative z-10 w-72 h-[80vh] md:w-96 flex items-center justify-center"
                        >
                            {/* SUBSTITUA O SRC PELA SUA FOTO */}
                            <div className="w-full h-full bg-slate-200 rounded-3xl shadow-2xl flex items-center justify-center overflow-hidden border-8 border-white">
                                <span className="text-slate-400 italic font-bold">Sua Foto de Corpo Inteiro</span>
                                {/* <img src="SUA_FOTO.jpg" className="w-full h-full object-cover" /> */}
                            </div>
                        </motion.div>

                        {/* Marquee Nome no Rodapé */}
                        <div className="absolute bottom-10 w-full overflow-hidden border-y border-slate-200/50 py-4 bg-white/30 backdrop-blur-sm">
                            <div className="animate-marquee whitespace-nowrap">
                                {[1,2,3,4,5,6].map(i => (
                                    <span key={i} className="text-6xl md:text-8xl font-black uppercase tracking-tighter mx-10 text-slate-900 opacity-80">
                                        Ràvila Costa •
                                    </span>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* SEÇÃO 2: PROJETOS */}
                    <section className="min-h-screen w-full flex flex-col md:flex-row border-t border-slate-100">
                        {/* Lado Esquerdo - Frase */}
                        <div className="w-full md:w-1/2 flex items-center justify-center p-12 bg-white">
                            <motion.h2 
                                initial={{ x: -100, opacity: 0 }}
                                whileInView={{ x: 0, opacity: 1 }}
                                transition={{ duration: 0.8 }}
                                className="text-5xl md:text-7xl font-bold leading-tight"
                            >
                                Transformando <span className="text-green-500">ideias</span> em experiências <span className="text-blue-500">digitais</span>.
                            </motion.h2>
                        </div>

                        {/* Lado Direito - Celulares */}
                        <div className="w-full md:w-1/2 h-screen bg-slate-50 overflow-hidden relative flex justify-center gap-6 p-4">
                            <div className="phone-column flex flex-col gap-6">
                                {[1,2,3,1,2,3].map((item, idx) => (
                                    <a key={idx} href="#" className="w-48 h-96 bg-slate-900 rounded-[3rem] border-[6px] border-slate-800 shadow-xl overflow-hidden flex-shrink-0 hover:scale-105 transition-transform">
                                        <div className="w-full h-full bg-blue-100 flex items-center justify-center text-xs text-center p-4">
                                            Preview Projeto {item}
                                        </div>
                                    </a>
                                ))}
                            </div>
                            <div className="phone-column flex flex-col gap-6 pt-20">
                                {[4,5,6,4,5,6].map((item, idx) => (
                                    <a key={idx} href="#" className="w-48 h-96 bg-slate-900 rounded-[3rem] border-[6px] border-slate-800 shadow-xl overflow-hidden flex-shrink-0 hover:scale-105 transition-transform">
                                        <div className="w-full h-full bg-green-100 flex items-center justify-center text-xs text-center p-4">
                                            Preview Projeto {item}
                                        </div>
                                    </a>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* SEÇÃO 3: TECNOLOGIAS */}
                    <section className="gradient-bg py-32 px-6 overflow-hidden relative">
                        <div className="max-w-5xl mx-auto text-center relative z-10">
                            <h2 className="text-4xl font-bold mb-16">Stack Tecnológica</h2>
                            <div className="flex flex-wrap justify-center gap-8 md:gap-16">
                                {['HTML5', 'CSS3', 'JavaScript', 'React', 'jQuery', 'Bootstrap', 'Git', 'Three.js'].map((tech, i) => (
                                    <motion.div
                                        key={tech}
                                        animate={{ y: [0, -15, 0] }}
                                        transition={{ duration: 3, repeat: Infinity, delay: i * 0.2 }}
                                        className="glass px-8 py-4 rounded-2xl shadow-sm font-bold text-xl hover:text-blue-600 transition-colors cursor-default"
                                    >
                                        {tech}
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* SEÇÃO 4: CONTATO */}
                    <section className="py-32 bg-white flex flex-col items-center px-6">
                        <motion.div 
                            initial={{ opacity: 0, y: 50 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            className="text-center"
                        >
                            <h2 className="text-5xl font-bold mb-8">Vamos conversar?</h2>
                            
                            <div className="flex flex-col md:flex-row gap-6 mb-12">
                                <a href="#" className="bg-slate-900 text-white px-8 py-4 rounded-full font-bold hover:bg-blue-600 transition-all flex items-center gap-2">
                                    Ver meu currículo (PDF)
                                </a>
                                <div className="flex gap-4 justify-center">
                                    <a href="mailto:email@exemplo.com" className="w-14 h-14 border border-slate-200 rounded-full flex items-center justify-center hover:bg-green-50 transition-colors">📧</a>
                                    <a href="https://linkedin.com/in/seuperfil" className="w-14 h-14 border border-slate-200 rounded-full flex items-center justify-center hover:bg-blue-50 transition-colors">in</a>
                                </div>
                            </div>
                            
                            <p className="text-slate-400">© 2024 Ràvila Costa. Feito com amor e código.</p>
                        </motion.div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
