<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portfólio Espacial</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
.info {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div class="info">
  <h2>🚀 Use ← → para mover o astronauta</h2>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

// CENA
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 10;

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

// 👨‍🚀 ASTRONAUTA (simples)
const astro = new THREE.Mesh(
  new THREE.BoxGeometry(1,1.5,1),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);
scene.add(astro);

// 🪐 PLANETAS COM ÓRBITA
const planets = [];

function createPlanet(color, radius, speed, url){
  const geo = new THREE.SphereGeometry(1, 32, 32);
  const mat = new THREE.MeshStandardMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);

  scene.add(mesh);

  planets.push({ mesh, radius, speed, angle: Math.random()*Math.PI*2, url });
}

createPlanet(0xff6b35, 4, 0.01, "https://github.com");
createPlanet(0xff3d3d, 6, 0.008, "https://github.com");
createPlanet(0xa855f7, 8, 0.006, "https://github.com");

// 🌌 ESTRELAS
const starsGeo = new THREE.BufferGeometry();
const starCount = 2000;
const positions = [];

for(let i=0;i<starCount;i++){
  positions.push(
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200
  );
}

starsGeo.setAttribute("position", new THREE.Float32BufferAttribute(positions,3));
const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ size:0.7 }));
scene.add(stars);

// ☄️ COMETA
const comet = new THREE.Mesh(
  new THREE.SphereGeometry(0.3,16,16),
  new THREE.MeshBasicMaterial({ color:0xffaa00 })
);
scene.add(comet);

let cometX = -20;

// 🎮 CONTROLE
let move = 0;

window.addEventListener("keydown", (e)=>{
  if(e.key === "ArrowRight") move = 0.1;
  if(e.key === "ArrowLeft") move = -0.1;
});

window.addEventListener("keyup", ()=> move = 0);

// 🖱 CLIQUE PLANETA
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click",(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects(planets.map(p=>p.mesh));

  if(hits.length){
    window.open(planets.find(p=>p.mesh===hits[0].object).url);
  }
});

// 🎬 ANIMAÇÃO
function animate(){
  requestAnimationFrame(animate);

  // movimento astronauta
  astro.position.x += move;

  // câmera segue
  camera.position.x = astro.position.x;

  // órbitas
  planets.forEach(p=>{
    p.angle += p.speed;
    p.mesh.position.x = Math.cos(p.angle)*p.radius;
    p.mesh.position.y = Math.sin(p.angle)*p.radius;
  });

  // cometa
  cometX += 0.2;
  comet.position.set(cometX, 5, -5);
  if(cometX > 20) cometX = -20;

  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
