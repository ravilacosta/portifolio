<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ràvila Costa | Portfólio</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  scroll-behavior:smooth;
}

/* SEÇÕES */
.section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* HERO */
.hero{
  background:linear-gradient(to right,#4CAF50,#2196F3);
  flex-direction:column;
  position:relative;
}

.hero img{
  height:60%;
  border-radius:20px;
}

.marquee{
  position:absolute;
  bottom:0;
  width:100%;
  overflow:hidden;
  white-space:nowrap;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:marquee 10s linear infinite;
  color:white;
  font-size:2rem;
}

@keyframes marquee{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

/* PROJETOS */
.projects{
  display:flex;
}

.left,.right{
  width:50%;
  height:100%;
}

.left{
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  padding:20px;
}

.right{
  background:#2196F3;
  overflow:hidden;
  position:relative;
}

.phone{
  width:120px;
  height:200px;
  background:white;
  border-radius:15px;
  margin:20px;
  animation:subir 6s linear infinite;
}

@keyframes subir{
  0%{transform:translateY(100%)}
  100%{transform:translateY(-120%)}
}

/* TECH */
.tech{
  flex-direction:column;
  background:linear-gradient(270deg,#4CAF50,#2196F3,#ffffff);
  background-size:600% 600%;
  animation:gradient 10s ease infinite;
}

@keyframes gradient{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* CONTACT */
.contact{
  flex-direction:column;
  gap:20px;
}

button{
  padding:12px 20px;
  border:none;
  background:#2196F3;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

a{
  text-decoration:none;
  color:black;
  font-size:18px;
}

/* RESPONSIVO */
@media(max-width:768px){
  .projects{
    flex-direction:column;
  }

  .left,.right{
    width:100%;
    height:50%;
  }

  .hero img{
    height:40%;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="section hero">
  <img src="sua-foto.png">
  
  <div class="marquee">
    <span>Ràvila Costa • Ràvila Costa • Ràvila Costa •</span>
  </div>
</section>

<!-- PROJETOS -->
<section class="section projects">
  <div class="left">
    <h1>Transformando ideias em experiências digitais</h1>
  </div>

  <div class="right">
    <div class="phone"></div>
    <div class="phone"></div>
    <div class="phone"></div>
    <div class="phone"></div>
  </div>
</section>

<!-- TECH + THREE -->
<section class="section tech">
  <h1>Tecnologias</h1>
  <div id="three"></div>
</section>

<!-- CONTATO -->
<section class="section contact">
  <h1>Contato</h1>

  <button onclick="window.open('curriculo.pdf')">
    Ver meu currículo
  </button>

  <a href="mailto:seuemail@gmail.com">📧 Email</a>
  <a href="#">💼 LinkedIn</a>
</section>

<!-- THREE.JS -->
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/300, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth, 300);
document.getElementById("three").appendChild(renderer.domElement);

const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshStandardMaterial({color:0x2196F3});
const cube = new THREE.Mesh(geometry, material);

scene.add(cube);

const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

camera.position.z = 3;

function animate(){
  requestAnimationFrame(animate);
  cube.rotation.x += 0.01;
  cube.rotation.y += 0.01;
  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
