<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Ràvila Costa • Portfólio Espacial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- React + Three via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <!-- Babel para usar JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Drei e Fiber -->
  <script src="https://unpkg.com/@react-three/fiber/dist/react-three-fiber.umd.js"></script>
  <script src="https://unpkg.com/@react-three/drei/dist/drei.umd.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #030008;
      font-family: 'Segoe UI', sans-serif;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

const { Canvas, useFrame } = ReactThreeFiber;
const { Stars, Text } = Drei;

// DADOS
const PROJECTS = [
  {
    name: "Front Eventos",
    color: "#ff6b35",
    position: [0, 0, 0],
    url: "https://github.com/ravilacosta/front-eventos"
  },
  {
    name: "Shopee Clone",
    color: "#ff3d3d",
    position: [5, 0, -2],
    url: "https://github.com/ravilacosta/shopee"
  },
  {
    name: "Loja Virtual",
    color: "#a855f7",
    position: [10, 0, 2],
    url: "https://github.com/ravilacosta/loja-virtual"
  }
];

// PLANETA SIMPLES
function Planet({ project }) {
  const ref = React.useRef();

  useFrame(() => {
    ref.current.rotation.y += 0.01;
  });

  return (
    <group position={project.position}>
      <mesh ref={ref}>
        <sphereGeometry args={[1, 32, 32]} />
        <meshStandardMaterial color={project.color} />
      </mesh>

      <Text
        position={[0, 1.8, 0]}
        fontSize={0.3}
        color="white"
        anchorX="center"
      >
        {project.name}
      </Text>
    </group>
  );
}

// CENA
function Scene() {
  return (
    <>
      <ambientLight intensity={0.5} />
      <Stars />

      {PROJECTS.map((p, i) => (
        <Planet key={i} project={p} />
      ))}
    </>
  );
}

// APP
function App() {
  return (
    <Canvas camera={{ position: [0, 2, 8] }}>
      <Scene />
    </Canvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
