<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Ràvila Costa • Portfólio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Three -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<!-- Fiber + Drei -->
<script src="https://unpkg.com/@react-three/fiber/dist/react-three-fiber.umd.js"></script>
<script src="https://unpkg.com/@react-three/drei/dist/drei.umd.js"></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #030008;
  font-family: Arial, sans-serif;
}

.hud {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  color: white;
}

.hud h1 {
  margin: 0;
  font-size: 26px;
  text-shadow: 0 0 20px #4488ff;
}

.hud p {
  font-size: 12px;
  color: #aaa;
}

.hud a {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 14px;
  border-radius: 20px;
  background: #4488ff;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { Canvas, useFrame } = ReactThreeFiber;
const { Stars, Text } = Drei;

// PROJETOS
const projects = [
  {
    name: "Front Eventos",
    color: "#ff6b35",
    position: [-4, 0, 0],
    url: "https://github.com/ravilacosta/front-eventos"
  },
  {
    name: "Shopee Clone",
    color: "#ff3d3d",
    position: [0, 0, 0],
    url: "https://github.com/ravilacosta/shopee"
  },
  {
    name: "Loja Virtual",
    color: "#a855f7",
    position: [4, 0, 0],
    url: "https://github.com/ravilacosta/loja-virtual"
  }
];

// PLANETA
function Planet({ project }) {
  const ref = React.useRef();

  useFrame(() => {
    ref.current.rotation.y += 0.01;
  });

  return (
    <group position={project.position}>
      <mesh
        ref={ref}
        onClick={() => window.open(project.url)}
      >
        <sphereGeometry args={[1.2, 32, 32]} />
        <meshStandardMaterial color={project.color} />
      </mesh>

      <Text
        position={[0, 2, 0]}
        fontSize={0.4}
        anchorX="center"
      >
        {project.name}
      </Text>
    </group>
  );
}

// CENA
function Scene() {
  return (
    <>
      <ambientLight intensity={0.6} />
      <directionalLight position={[5, 5, 5]} />

      <Stars radius={100} depth={50} count={5000} factor={4} />

      {projects.map((p, i) => (
        <Planet key={i} project={p} />
      ))}
    </>
  );
}

// APP
function App() {
  return (
    <>
      <Canvas camera={{ position: [0, 2, 8], fov: 60 }}>
        <Scene />
      </Canvas>

      <div className="hud">
        <h1>🚀 Ràvila Costa</h1>
        <p>Backend Developer • Portfólio Espacial</p>
        <a href="https://github.com/ravilacosta" target="_blank">
          Ver GitHub
        </a>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
