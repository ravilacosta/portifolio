<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio Criativo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, border 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: #4ade80;
        }
        .avatar-glow {
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- BACKGROUND 3D (Three.js) ---
        const Background3D = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                mountRef.current.appendChild(renderer.domElement);

                // Criar estrelas/partículas
                const starGeometry = new THREE.BufferGeometry();
                const starMaterial = new THREE.PointsMaterial({ color: 0x4ade80, size: 0.02 });
                const starVertices = [];
                for (let i = 0; i < 5000; i++) {
                    const x = (Math.random() - 0.5) * 20;
                    const y = (Math.random() - 0.5) * 20;
                    const z = (Math.random() - 0.5) * 20;
                    starVertices.push(x, y, z);
                }
                starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
                const stars = new THREE.Points(starGeometry, starMaterial);
                scene.add(stars);

                camera.position.z = 5;

                const animate = () => {
                    requestAnimationFrame(animate);
                    stars.rotation.y += 0.001;
                    stars.rotation.x += 0.0005;
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            return <div ref={mountRef} />;
        };

        // --- APP PRINCIPAL ---
        const App = () => {
            const [view, setView] = useState('home');

            return (
                <div className="min-h-screen w-full relative">
                    <Background3D />
                    
                    {/* TELA INICIAL */}
                    {view === 'home' && (
                        <main className="flex flex-col items-center justify-center min-h-screen text-center p-6 fade-in">
                            <div className="avatar-glow w-40 h-40 bg-gradient-to-tr from-green-400 to-blue-500 rounded-full mb-8 flex items-center justify-center text-7xl">
                                👨‍💻
                            </div>
                            <h1 className="text-6xl font-black tracking-tighter mb-4">
                                [Seu Nome]
                            </h1>
                            <p className="text-xl text-gray-400 mb-10 max-w-md">
                                Transformando café em código e ideias em experiências 3D.
                            </p>
                            <button 
                                onClick={() => setView('portfolio')}
                                className="bg-white text-black px-10 py-4 rounded-full font-bold text-lg hover:bg-green-400 hover:scale-110 transition-all duration-300"
                            >
                                Vamos começar
                            </button>
                        </main>
                    )}

                    {/* TELA DE PROJETOS E COMPETÊNCIAS */}
                    {view === 'portfolio' && (
                        <div className="max-w-5xl mx-auto p-8 pt-20 fade-in">
                            <button 
                                onClick={() => setView('home')}
                                className="text-green-400 hover:underline mb-10 block"
                            >
                                ← Voltar ao início
                            </button>

                            <section className="mb-20">
                                <h2 className="text-4xl font-bold mb-8">Competências</h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {['React.js', 'Three.js', 'JavaScript', 'Tailwind CSS', 'HTML/CSS', 'Git/GitHub'].map(skill => (
                                        <div key={skill} className="glass-card p-4 rounded-xl text-center font-medium">
                                            {skill}
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <section>
                                <h2 className="text-4xl font-bold mb-8">Meus Projetos</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="glass-card p-8 rounded-2xl">
                                        <div className="text-green-400 mb-4 text-xs font-bold uppercase tracking-widest">Web / 3D</div>
                                        <h3 className="text-2xl font-bold mb-3">Portfolio Interativo</h3>
                                        <p className="text-gray-400 leading-relaxed">Desenvolvido em arquivo único para demonstrar o poder do Three.js e React trabalhando juntos.</p>
                                    </div>
                                    <div className="glass-card p-8 rounded-2xl opacity-50">
                                        <div className="text-gray-400 mb-4 text-xs font-bold uppercase tracking-widest">Em breve</div>
                                        <h3 className="text-2xl font-bold mb-3">Novo Projeto</h3>
                                        <p className="text-gray-400 leading-relaxed">Algo incrível está sendo construído aqui. Fique ligado!</p>
                                    </div>
                                </div>
                            </section>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
