
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ràvila Costa — Space Portfolio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  overflow:hidden;
  font-family:'Orbitron',sans-serif;
  cursor:pointer;
}

/* HUD */
#hud{
  position:fixed;
  top:20px;
  left:30px;
  color:#00f7ff;
  text-shadow:0 0 20px #00f7ff;
  z-index:10;
}

#hud h1{font-size:18px;letter-spacing:3px;}
#hud span{font-size:11px;opacity:.7;}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:20;
}

#modal.active{
  opacity:1;
  pointer-events:all;
}

#modal-box{
  background:#000;
  border:1px solid #00f7ff;
  padding:30px;
  width:320px;
  text-align:center;
  box-shadow:0 0 40px #00f7ff55;
}

#modal-box h2{margin-bottom:10px;}
#modal-box p{font-size:12px;opacity:.8;margin-bottom:20px;}

#modal-box a{
  display:inline-block;
  padding:10px 20px;
  border:1px solid #00f7ff;
  color:#00f7ff;
  text-decoration:none;
}
</style>
</head>

<body>

<div id="hud">
  <h1>RÀVILA COSTA</h1>
  <span>INTERACTIVE SPACE PORTFOLIO</span>
</div>

<div id="modal">
  <div id="modal-box">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <a id="link" target="_blank">VER PROJETO</a>
  </div>
</div>

<canvas id="c"></canvas>

<!-- AUDIO -->
<audio id="bg-audio" loop>
  <source src="https://cdn.pixabay.com/audio/2022/10/25/audio_946b6b5f9e.mp3" type="audio/mp3">
</audio>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- POST FX -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// DATA
const PROJECTS=[
 {name:"Front Eventos",desc:"Sistema de eventos moderno",url:"https://github.com/",color:0xff3d7f,x:6},
 {name:"Shopee Clone",desc:"E-commerce completo",url:"https://github.com/",color:0x7c3aed,x:12},
 {name:"Loja Virtual",desc:"Plataforma de vendas",url:"https://github.com/",color:0xff6b35,x:18}
];

// AUDIO START
let audioStarted=false;
document.body.addEventListener("click",()=>{
  if(!audioStarted){
    document.getElementById("bg-audio").play();
    audioStarted=true;
  }
});

// THREE SETUP
const canvas=document.getElementById("c");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(innerWidth,innerHeight);

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,500);
camera.position.set(0,2,10);

// BLOOM
const composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));

const bloom=new THREE.UnrealBloomPass(
 new THREE.Vector2(innerWidth,innerHeight),1.8,.4,.85
);
composer.addPass(bloom);

// LIGHT
scene.add(new THREE.AmbientLight(0x111122,1));
const rim=new THREE.PointLight(0x00f7ff,4,50);
rim.position.set(-5,5,-5);
scene.add(rim);

// STARS
function stars(n,s){
 const g=new THREE.BufferGeometry();
 const p=new Float32Array(n*3);
 for(let i=0;i<n*3;i++) p[i]=(Math.random()-0.5)*s;
 g.setAttribute("position",new THREE.BufferAttribute(p,3));
 return new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.7}));
}
scene.add(stars(4000,400));

// PLANETS
const meshes=[];
PROJECTS.forEach(p=>{
 const m=new THREE.Mesh(
  new THREE.SphereGeometry(1.5,64,64),
  new THREE.MeshStandardMaterial({
   color:p.color,
   emissive:p.color,
   emissiveIntensity:1.5
  })
 );
 m.position.x=p.x;
 scene.add(m);
 meshes.push(m);
});

// ASTRONAUTA
const astronaut=new THREE.Group();

const body=new THREE.Mesh(
 new THREE.CylinderGeometry(.4,.5,1.3,32),
 new THREE.MeshStandardMaterial({color:0xffffff})
);
astronaut.add(body);

const head=new THREE.Mesh(
 new THREE.SphereGeometry(.5,32,32),
 new THREE.MeshStandardMaterial({color:0xffffff})
);
head.position.y=1;
astronaut.add(head);

scene.add(astronaut);

// MOVIMENTO
let targetX=0;
addEventListener("keydown",e=>{
 if(e.code==="ArrowRight")targetX+=2;
 if(e.code==="ArrowLeft")targetX-=2;
});

// CLICK PLANET
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();

addEventListener("click",e=>{
 mouse.x=(e.clientX/innerWidth)*2-1;
 mouse.y=-(e.clientY/innerHeight)*2+1;

 ray.setFromCamera(mouse,camera);
 const hits=ray.intersectObjects(meshes);

 if(hits.length){
   const i=meshes.indexOf(hits[0].object);
   openModal(PROJECTS[i]);
 }
});

function openModal(p){
 document.getElementById("modal").classList.add("active");
 title.textContent=p.name;
 desc.textContent=p.desc;
 link.href=p.url;
}

document.getElementById("modal").onclick=()=>{
 document.getElementById("modal").classList.remove("active");
}

// ANIMATE
function animate(){
 requestAnimationFrame(animate);

 astronaut.position.x+=(targetX-astronaut.position.x)*.05;
 camera.position.x+=(astronaut.position.x-camera.position.x)*.05;

 meshes.forEach(m=>m.rotation.y+=.01);

 composer.render();
}
animate();

// RESIZE
addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
