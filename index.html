<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portfólio Espacial Game</title>

<style>
body { margin:0; overflow:hidden; background:black; }
.info {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div class="info">
  <h2>🚀 WASD para mover • Espaço para pular</h2>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

// CENA
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,8);

// RENDER
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// 👨‍🚀 ASTRONAUTA (modelo real)
let astronaut;
const loader = new GLTFLoader();

loader.load(
  "https://modelviewer.dev/shared-assets/models/Astronaut.glb",
  (gltf)=>{
    astronaut = gltf.scene;
    astronaut.scale.set(1,1,1);
    scene.add(astronaut);
  }
);

// 🎮 CONTROLES
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// 🪐 PLANETAS
const planets = [];

function createPlanet(color, radius, speed, url){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.2,32,32),
    new THREE.MeshStandardMaterial({ color, emissive:color, emissiveIntensity:0.4 })
  );

  scene.add(mesh);
  planets.push({ mesh, radius, speed, angle: Math.random()*6.28, url });
}

createPlanet(0xff6b35, 5, 0.01, "https://github.com/ravilacosta/front-eventos");
createPlanet(0xff3d3d, 7, 0.008, "https://github.com/ravilacosta/shopee");
createPlanet(0xa855f7, 9, 0.006, "https://github.com/ravilacosta/loja-virtual");

// 🌌 ESTRELAS
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const pos = [];

for(let i=0;i<starCount;i++){
  pos.push((Math.random()-0.5)*300);
  pos.push((Math.random()-0.5)*300);
  pos.push((Math.random()-0.5)*300);
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));

const stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({ size:0.7 })
);

scene.add(stars);

// ☄️ COMETA COM RASTRO
const comet = new THREE.Mesh(
  new THREE.SphereGeometry(0.3),
  new THREE.MeshBasicMaterial({ color:0xffaa00 })
);

const trail = [];

for(let i=0;i<20;i++){
  const t = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshBasicMaterial({ color:0xff5500, transparent:true, opacity:0.3 })
  );
  scene.add(t);
  trail.push(t);
}

scene.add(comet);
let cometX = -30;

// 🖱 CLIQUE
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click",(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects(planets.map(p=>p.mesh));

  if(hits.length){
    window.open(planets.find(p=>p.mesh===hits[0].object).url);
  }
});

// 🎬 LOOP
function animate(){
  requestAnimationFrame(animate);

  // movimento astronauta
  if(astronaut){
    if(keys["w"]) astronaut.position.z -= 0.1;
    if(keys["s"]) astronaut.position.z += 0.1;
    if(keys["a"]) astronaut.position.x -= 0.1;
    if(keys["d"]) astronaut.position.x += 0.1;

    // câmera segue
    camera.position.x = astronaut.position.x;
    camera.position.z = astronaut.position.z + 8;
    camera.lookAt(astronaut.position);
  }

  // órbitas
  planets.forEach(p=>{
    p.angle += p.speed;
    p.mesh.position.x = Math.cos(p.angle)*p.radius;
    p.mesh.position.z = Math.sin(p.angle)*p.radius;
  });

  // cometa
  cometX += 0.3;
  comet.position.set(cometX, 4, -5);

  trail.forEach((t,i)=>{
    t.position.copy(comet.position);
    t.position.x -= i*0.5;
  });

  if(cometX > 30) cometX = -30;

  renderer.render(scene,camera);
}

animate();

// RESPONSIVO
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
