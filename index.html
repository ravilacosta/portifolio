<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ràvila Costa · Space Portfolio</title>
</head>
<body>

<canvas id="c"></canvas>

<script type="module">

// ✅ IMPORTS CORRETOS (CDN - FUNCIONA NO GITHUB PAGES)
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

// ── CENA BÁSICA ─────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 6);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias: true });
renderer.setSize(innerWidth, innerHeight);

// ── LUZ ─────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 1));

// ── PLANETA TESTE ─────────────────────────
const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1, 32, 32),
  new THREE.MeshStandardMaterial({ color: 0x00aaff })
);
scene.add(sphere);

// ── LOADER DO ASTRONAUTA ─────────────────────────
const loader = new GLTFLoader();

loader.load(
  "https://modelviewer.dev/shared-assets/models/Astronaut.glb",
  (gltf) => {
    const astronaut = gltf.scene;
    astronaut.scale.set(1,1,1);
    astronaut.position.set(0,0,0);
    scene.add(astronaut);
  },
  undefined,
  (error) => {
    console.error("Erro ao carregar astronauta:", error);
  }
);

// ── LOOP ─────────────────────────
function animate(){
  requestAnimationFrame(animate);
  sphere.rotation.y += 0.01;
  renderer.render(scene, camera);
}
animate();

// ── RESPONSIVO ─────────────────────────
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>
</body>
</html>
