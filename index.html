<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Ràvila Costa • Portfólio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #030008;
  font-family: Arial, sans-serif;
}

.hud {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  color: white;
}

.hud h1 {
  margin: 0;
  font-size: 26px;
  text-shadow: 0 0 20px #4488ff;
}

.hud p {
  font-size: 12px;
  color: #aaa;
}

.hud a {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 14px;
  border-radius: 20px;
  background: #4488ff;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="module">
import React from "https://esm.sh/react@18";
import ReactDOM from "https://esm.sh/react-dom@18/client";
import * as THREE from "https://esm.sh/three@0.160.0";
import { Canvas, useFrame } from "https://esm.sh/@react-three/fiber";
import { Stars, Text } from "https://esm.sh/@react-three/drei";

// PROJETOS
const projects = [
  {
    name: "Front Eventos",
    color: "#ff6b35",
    position: [-4, 0, 0],
    url: "https://github.com/ravilacosta/front-eventos"
  },
  {
    name: "Shopee Clone",
    color: "#ff3d3d",
    position: [0, 0, 0],
    url: "https://github.com/ravilacosta/shopee"
  },
  {
    name: "Loja Virtual",
    color: "#a855f7",
    position: [4, 0, 0],
    url: "https://github.com/ravilacosta/loja-virtual"
  }
];

// PLANETA
function Planet({ project }) {
  const ref = React.useRef();

  useFrame(() => {
    if (ref.current) ref.current.rotation.y += 0.01;
  });

  return (
    React.createElement("group", { position: project.position },
      React.createElement("mesh", {
        ref: ref,
        onClick: () => window.open(project.url)
      },
        React.createElement("sphereGeometry", { args: [1.2, 32, 32] }),
        React.createElement("meshStandardMaterial", { color: project.color })
      ),
      React.createElement(Text, {
        position: [0, 2, 0],
        fontSize: 0.4,
        anchorX: "center"
      }, project.name)
    )
  );
}

// CENA
function Scene() {
  return (
    React.createElement(React.Fragment, null,
      React.createElement("ambientLight", { intensity: 0.6 }),
      React.createElement("directionalLight", { position: [5, 5, 5] }),
      React.createElement(Stars, { radius: 100, depth: 50, count: 5000 }),
      projects.map((p, i) =>
        React.createElement(Planet, { key: i, project: p })
      )
    )
  );
}

// APP
function App() {
  return (
    React.createElement(React.Fragment, null,
      React.createElement(Canvas, { camera: { position: [0, 2, 8] } },
        React.createElement(Scene)
      ),
      React.createElement("div", { className: "hud" },
        React.createElement("h1", null, "🚀 Ràvila Costa"),
        React.createElement("p", null, "Backend Developer • Portfólio Espacial"),
        React.createElement("a", {
          href: "https://github.com/ravilacosta",
          target: "_blank"
        }, "Ver GitHub")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(App)
);

</script>

</body>
</html>
