<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio | Azul & Cinza</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #2c3e50;
        }

        /* Container do Three.js */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay sutil para melhor legibilidade */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(255,255,255,0.3) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Conteúdo principal */
        .content {
            position: relative;
            z-index: 3;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            pointer-events: none;
        }

        /* Card principal */
        .hero-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 3rem;
            max-width: 900px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            pointer-events: auto;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Layout da apresentação */
        .presentation {
            display: flex;
            align-items: center;
            gap: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Espaço para foto - formato circular moderno */
        .photo-frame {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a8d8ff, #7ab8ff);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 30px -10px rgba(52, 152, 219, 0.3);
            border: 4px solid white;
            transition: transform 0.3s ease;
        }

        .photo-frame:hover {
            transform: scale(1.05);
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #e0f0ff, #b8d9ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #2c3e50;
            font-weight: 300;
        }

        /* Informações de nome e título */
        .name-info {
            flex: 1;
            min-width: 250px;
        }

        .name-info h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .name-info .title {
            font-size: 1.25rem;
            color: #4a5568;
            font-weight: 400;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .title-line {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, #7ab8ff, transparent);
        }

        .tags {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #2c3e50;
            border: 1px solid rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        /* Seção de estatísticas */
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #1e3c72;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Cards de habilidades */
        .skills-section {
            margin-top: 2rem;
        }

        .skills-title {
            font-size: 1.1rem;
            color: #4a5568;
            margin-bottom: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
        }

        .skill-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            cursor: default;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 20px -10px rgba(52, 152, 219, 0.3);
        }

        .skill-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .skill-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #2c3e50;
        }

        /* Botão de ação */
        .action-button {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: #1e3c72;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            pointer-events: auto;
        }

        .btn:hover {
            background: white;
            transform: scale(1.05);
            box-shadow: 0 15px 30px -10px rgba(52, 152, 219, 0.4);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .hero-card {
                padding: 2rem;
            }
            
            .name-info h1 {
                font-size: 2.5rem;
            }
            
            .photo-frame {
                width: 140px;
                height: 140px;
            }
            
            .stats {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="overlay"></div>
    
    <div class="content">
        <div class="hero-card">
            <!-- Apresentação com foto e nome -->
            <div class="presentation">
                <div class="photo-frame">
                    <div class="photo-placeholder">
                        👤
                    </div>
                </div>
                
                <div class="name-info">
                    <h1>SEU NOME AQUI</h1>
                    <div class="title">
                        <span class="title-line"></span>
                        <span>Desenvolvedor Full Stack</span>
                    </div>
                    <div class="tags">
                        <span class="tag">React</span>
                        <span class="tag">Node.js</span>
                        <span class="tag">TypeScript</span>
                        <span class="tag">Python</span>
                    </div>
                </div>
            </div>

            <!-- Estatísticas rápidas -->
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">5+</div>
                    <div class="stat-label">Anos de experiência</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">20+</div>
                    <div class="stat-label">Projetos completos</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">10+</div>
                    <div class="stat-label">Clientes satisfeitos</div>
                </div>
            </div>

            <!-- Habilidades -->
            <div class="skills-section">
                <div class="skills-title">PRINCIPAIS HABILIDADES</div>
                <div class="skills-grid">
                    <div class="skill-card">
                        <div class="skill-icon">⚛️</div>
                        <div class="skill-name">React</div>
                    </div>
                    <div class="skill-card">
                        <div class="skill-icon">📱</div>
                        <div class="skill-name">React Native</div>
                    </div>
                    <div class="skill-card">
                        <div class="skill-icon">🟢</div>
                        <div class="skill-name">Node.js</div>
                    </div>
                    <div class="skill-card">
                        <div class="skill-icon">📊</div>
                        <div class="skill-name">MongoDB</div>
                    </div>
                    <div class="skill-card">
                        <div class="skill-icon">🎨</div>
                        <div class="skill-name">UI/UX</div>
                    </div>
                </div>
            </div>

            <!-- Botão de ação -->
            <div class="action-button">
                <a href="#" class="btn">
                    <span>Ver projetos</span>
                    <span>→</span>
                </a>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Configuração da cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f7ff); // Azul muito claro

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0xf0f7ff);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Iluminação suave
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // Pontos de luz coloridos sutis
        const colors = [0xa8d8ff, 0xb8d9ff, 0xc0e0ff, 0xd0e8ff];
        
        for (let i = 0; i < 4; i++) {
            const light = new THREE.PointLight(colors[i], 0.8, 20);
            light.position.set(
                Math.sin(i * Math.PI / 2) * 8,
                Math.cos(i * Math.PI / 2) * 8,
                5
            );
            scene.add(light);
        }

        // Criar partículas flutuantes
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        
        const posArray = new Float32Array(particlesCount * 3);
        const colorArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i += 3) {
            // Posições em uma esfera
            const radius = 12 + Math.random() * 5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            posArray[i] = radius * Math.sin(phi) * Math.cos(theta);
            posArray[i+1] = radius * Math.sin(phi) * Math.sin(theta);
            posArray[i+2] = radius * Math.cos(phi);

            // Cores: tons de azul, branco e cinza claro
            const colorChoice = Math.random();
            let r, g, b;
            
            if (colorChoice < 0.6) { // Azul claro
                r = 0.7 + Math.random() * 0.3;
                g = 0.8 + Math.random() * 0.2;
                b = 1.0;
            } else if (colorChoice < 0.85) { // Branco
                r = 0.95 + Math.random() * 0.05;
                g = 0.95 + Math.random() * 0.05;
                b = 1.0;
            } else { // Cinza claro
                r = 0.85 + Math.random() * 0.1;
                g = 0.85 + Math.random() * 0.1;
                b = 0.9 + Math.random() * 0.1;
            }
            
            colorArray[i] = r;
            colorArray[i+1] = g;
            colorArray[i+2] = b;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // Adicionar algumas linhas geométricas suaves
        const linesGeometry = new THREE.BufferGeometry();
        const linesCount = 50;
        const linesPositions = [];

        for (let i = 0; i < linesCount; i++) {
            const startAngle = (i / linesCount) * Math.PI * 2;
            const endAngle = startAngle + Math.PI / 4;
            
            const radius1 = 10;
            const radius2 = 12;
            
            const x1 = Math.cos(startAngle) * radius1;
            const y1 = Math.sin(startAngle) * radius1;
            const z1 = Math.sin(startAngle) * 2;
            
            const x2 = Math.cos(endAngle) * radius2;
            const y2 = Math.sin(endAngle) * radius2;
            const z2 = Math.cos(endAngle) * 2;
            
            linesPositions.push(x1, y1, z1);
            linesPositions.push(x2, y2, z2);
        }

        linesGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linesPositions, 3));
        
        const linesMaterial = new THREE.LineBasicMaterial({ color: 0xa8d8ff, opacity: 0.1, transparent: true });
        const lines = new THREE.LineSegments(linesGeometry, linesMaterial);
        scene.add(lines);

        // Animação
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const elapsedTime = performance.now() / 1000;

            // Rotação suave das partículas
            particlesMesh.rotation.y = elapsedTime * 0.05;
            particlesMesh.rotation.x = Math.sin(elapsedTime * 0.1) * 0.1;
            
            // Rotação das linhas
            lines.rotation.y = elapsedTime * 0.02;
            lines.rotation.x = Math.sin(elapsedTime * 0.2) * 0.05;

            // Movimento sutil da câmera
            camera.position.x = Math.sin(elapsedTime * 0.2) * 2;
            camera.position.y = Math.cos(elapsedTime * 0.3) * 1;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        animate();

        // Ajuste de resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Interação com mouse
        document.addEventListener('mousemove', (event) => {
            const mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            const mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Movimento sutil baseado no mouse
            particlesMesh.rotation.y += mouseX * 0.0005;
            particlesMesh.rotation.x += mouseY * 0.0005;
        });
    </script>
</body>
</html>
