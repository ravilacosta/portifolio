<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Portfólio 3D | Navegação Imersiva</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', 'Montserrat', sans-serif;
        }
        
        /* Interface UI */
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: white;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 30px;
            pointer-events: none;
            font-weight: 500;
            letter-spacing: 1px;
            border-left: 4px solid #ff3366;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        #info h1 {
            margin: 0;
            font-size: 1.2rem;
        }
        
        #info p {
            margin: 5px 0 0;
            font-size: 0.7rem;
            opacity: 0.8;
        }
        
        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            display: flex;
            gap: 15px;
        }
        
        .controls-key {
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: bold;
        }
        
        #project-modal {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            z-index: 200;
            background: linear-gradient(135deg, rgba(20,20,40,0.95), rgba(10,10,25,0.95));
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px 30px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 40px rgba(0,0,0,0.5), 0 0 20px rgba(255,51,102,0.3);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            font-family: 'Poppins', sans-serif;
            min-width: 260px;
        }
        
        #project-modal.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }
        
        #project-modal h3 {
            margin: 0 0 10px;
            color: #ff3366;
        }
        
        #project-modal p {
            margin: 5px 0;
            font-size: 14px;
        }
        
        #project-modal a {
            display: inline-block;
            margin-top: 12px;
            color: #ff3366;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid #ff3366;
            padding-bottom: 2px;
        }
        
        #close-modal {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 12px;
            cursor: pointer;
            font-size: 12px;
        }
        
        @media (max-width: 600px) {
            #controls-panel { display: none; }
            #info { font-size: 10px; top: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>✨ PORTFÓLIO 3D | NAVEGAÇÃO IMERSIVA</h1>
        <p>WASD / SETAS → Mover-se | Clique nos blocos luminosos para ver projetos</p>
    </div>
    <div id="controls-panel">
        <span>⬆️⬇️⬅️➡️</span>
        <span class="controls-key">W A S D</span>
        <span>🎯 Aproxime-se dos cristais</span>
    </div>
    <div id="project-modal">
        <h3 id="project-title">Projeto</h3>
        <p id="project-desc">Descrição incrível</p>
        <a id="project-link" href="#" target="_blank">🔗 Ver no GitHub →</a>
        <div><button id="close-modal">Fechar</button></div>
    </div>

    <!-- Import Three.js core e extensões -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- CONFIGURAÇÃO DA CENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // névoa sutil
        
        // --- CÂMERA EM PRIMEIRA PESSOA ---
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2.5, 8);
        camera.rotation.order = 'YXZ';
        
        // --- RENDERERS ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // sombras realistas
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // CSS2DRenderer para textos sempre virados para câmera
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- LUZES E AMBIENTE VIBRANTE ---
        // Luz ambiente colorida
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        
        // Luz principal direcional
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);
        
        // Luz de preenchimento colorida (magenta)
        const fillLight = new THREE.PointLight(0xff44aa, 0.5);
        fillLight.position.set(-3, 2, 4);
        scene.add(fillLight);
        
        // Luz azul dinâmica
        const blueLight = new THREE.PointLight(0x2266ff, 0.6);
        blueLight.position.set(4, 3, -2);
        scene.add(blueLight);
        
        // Luz de fundo que muda de cor
        const backLight = new THREE.PointLight(0xffaa33, 0.4);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);
        
        // Chão reflexivo com grid luminoso
        const gridHelper = new THREE.GridHelper(40, 30, 0xff44aa, 0x33aaff);
        gridHelper.position.y = -0.2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        // Plano de chão transparente para sombras
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 30),
            new THREE.ShadowMaterial({ opacity: 0.5, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.15;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // --- OBJETOS DECORATIVOS: CUBOS FLUTUANTES E CRISTAIS ---
        
        // Criar um material brilhante neon
        const neonMaterial = (color) => new THREE.MeshStandardMaterial({
            color: color,
            emissive: color,
            emissiveIntensity: 0.6,
            metalness: 0.8,
            roughness: 0.2
        });
        
        const glassMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x88aaff,
            metalness: 0.9,
            roughness: 0.1,
            transparent: true,
            opacity: 0.7,
            emissive: 0x2266ff,
            emissiveIntensity: 0.3
        });
        
        // Adicionar torres de cristais coloridos (cada um será um projeto)
        const projectsData = [
            { title: "🚀 AI Motion System", desc: "Sistema de visão computacional com Three.js e TensorFlow.", link: "https://github.com/seuuser/ai-motion", color: 0xff3366, pos: { x: -3.5, z: -4 }, y: 0.4 },
            { title: "🎨 Shader Art Gallery", desc: "Filtros e shaders GLSL interativos em tempo real.", link: "https://github.com/seuuser/shader-art", color: 0x33ff66, pos: { x: 4.2, z: -3 }, y: 0.4 },
            { title: "🌌 Universe Explorer", desc: "Visualização 3D de estrelas e nebulosas com WebGL.", link: "https://github.com/seuuser/universe-explorer", color: 0x33aaff, pos: { x: -2, z: 5 }, y: 0.4 },
            { title: "🔮 Portal Generator", desc: "Efeitos de portal procedural com partículas dinâmicas.", link: "https://github.com/seuuser/portal-gen", color: 0xffaa44, pos: { x: 3, z: 4.5 }, y: 0.4 },
            { title: "💎 NFT 3D Cards", desc: "Coleção de cards 3D interativos para Web3.", link: "https://github.com/seuuser/nft-cards", color: 0xdd44ff, pos: { x: -4, z: 2 }, y: 0.4 },
            { title: "⚡ Real-time Particles", desc: "Sistema de partículas com física e cores HSL.", link: "https://github.com/seuuser/particles-fx", color: 0xff8833, pos: { x: 5, z: -1.5 }, y: 0.4 }
        ];
        
        const projectMeshes = [];
        
        // Função para criar um cristal estilizado (geometria Icosaedro + cone)
        function createGem(color, size = 0.5) {
            const group = new THREE.Group();
            const coreMat = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.5,
                metalness: 0.7,
                roughness: 0.2
            });
            const gemGeo = new THREE.IcosahedronGeometry(size, 0);
            const gem = new THREE.Mesh(gemGeo, coreMat);
            gem.castShadow = true;
            gem.receiveShadow = false;
            
            const spikeMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 });
            const spikeGeo = new THREE.ConeGeometry(size * 0.6, size * 1.2, 6);
            const spike = new THREE.Mesh(spikeGeo, spikeMat);
            spike.position.y = size * 0.8;
            spike.castShadow = true;
            
            group.add(gem);
            group.add(spike);
            return group;
        }
        
        // Criar pódio circular para cada projeto
        projectsData.forEach((proj, idx) => {
            const { x, z, y, color, title, desc, link } = proj;
            
            // Plataforma base brilhante
            const platformMat = new THREE.MeshStandardMaterial({ color: 0x222233, metalness: 0.4, roughness: 0.3, emissive: color, emissiveIntensity: 0.2 });
            const platform = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.9, 0.2, 16), platformMat);
            platform.position.set(x, y - 0.2, z);
            platform.castShadow = true;
            platform.receiveShadow = true;
            scene.add(platform);
            
            // Anel luminoso ao redor
            const ringMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.8, transparent: true });
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.05, 32, 64), ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.set(x, y + 0.1, z);
            scene.add(ring);
            
            // Cristal principal
            const gemGroup = createGem(color, 0.45);
            gemGroup.position.set(x, y + 0.35, z);
            gemGroup.castShadow = true;
            scene.add(gemGroup);
            
            // Partículas flutuantes ao redor do cristal
            const particleCount = 30;
            const particles = [];
            for (let i = 0; i < particleCount; i++) {
                const particleGeo = new THREE.SphereGeometry(0.04, 8, 8);
                const particleMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.9 });
                const particle = new THREE.Mesh(particleGeo, particleMat);
                particle.userData = {
                    angle: Math.random() * Math.PI * 2,
                    radius: 0.7 + Math.random() * 0.5,
                    speed: 0.5 + Math.random() * 1,
                    yOffset: (Math.random() - 0.5) * 0.8
                };
                particle.castShadow = false;
                scene.add(particle);
                particles.push(particle);
            }
            
            // CSS2D Label com o nome do projeto
            const div = document.createElement('div');
            div.textContent = title;
            div.style.backgroundColor = 'rgba(0,0,0,0.7)';
            div.style.color = '#fff';
            div.style.padding = '4px 12px';
            div.style.borderRadius = '20px';
            div.style.fontSize = '14px';
            div.style.fontWeight = 'bold';
            div.style.borderLeft = `3px solid ${new THREE.Color(color).getStyle()}`;
            div.style.backdropFilter = 'blur(4px)';
            div.style.pointerEvents = 'none';
            div.style.fontFamily = 'Poppins, sans-serif';
            const label = new CSS2DObject(div);
            label.position.set(x, y + 0.9, z);
            scene.add(label);
            
            // Armazenar dados para interação
            projectMeshes.push({
                position: new THREE.Vector3(x, y + 0.4, z),
                title, desc, link,
                color,
                ringObj: ring,
                gemGroup,
                particles,
                radius: 1.2
            });
        });
        
        // --- CENÁRIO ENVOLVENTE: PILARES DE LUZ E EFEITOS DE PARTÍCULAS GLOBAIS ---
        
        // Pilares de luz (cilindros com emissão)
        const pillarPositions = [
            [-6, 0, -5], [6, 0, -5], [-5, 0, 6], [5, 0, 6], [0, 0, -7]
        ];
        pillarPositions.forEach(pos => {
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0x77aaff, emissive: 0x3377ff, emissiveIntensity: 0.3, metalness: 0.7 });
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 2.5, 8), pillarMat);
            pillar.position.set(pos[0], pos[1] + 1.2, pos[2]);
            pillar.castShadow = true;
            scene.add(pillar);
            
            const topLight = new THREE.PointLight(0x44aaff, 0.8, 10);
            topLight.position.set(pos[0], pos[1] + 2.5, pos[2]);
            scene.add(topLight);
        });
        
        // Sistema de partículas flutuantes (ambiente mágico)
        const particleSysGeo = new THREE.BufferGeometry();
        const particleCountEnv = 800;
        const particlePositions = new Float32Array(particleCountEnv * 3);
        for (let i = 0; i < particleCountEnv; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 35;
            particlePositions[i*3+1] = Math.random() * 6;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 25 - 5;
        }
        particleSysGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMatEnv = new THREE.PointsMaterial({
            color: 0xffaa88,
            size: 0.08,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const particleSystem = new THREE.Points(particleSysGeo, particleMatEnv);
        scene.add(particleSystem);
        
        // Adicionar um grande anel giratório (estilo portal)
        const ringBigGeo = new THREE.TorusGeometry(3.2, 0.08, 64, 200);
        const ringBigMat = new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288, emissiveIntensity: 0.7 });
        const bigRing = new THREE.Mesh(ringBigGeo, ringBigMat);
        bigRing.position.set(0, 1.5, -6);
        bigRing.rotation.x = Math.PI / 2;
        scene.add(bigRing);
        
        const ringBigGeo2 = new THREE.TorusGeometry(3.8, 0.06, 64, 200);
        const ringBigMat2 = new THREE.MeshStandardMaterial({ color: 0x33ccff, emissive: 0x33aaff, emissiveIntensity: 0.5 });
        const bigRing2 = new THREE.Mesh(ringBigGeo2, ringBigMat2);
        bigRing2.position.set(0, 1.5, -6);
        bigRing2.rotation.x = Math.PI / 2 + 0.2;
        scene.add(bigRing2);
        
        // --- CONTROLE DE MOVIMENTO EM PRIMEIRA PESSOA (WASD / SETAS) ---
        const keyState = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, s: false, a: false, d: false };
        let moveSpeed = 4.5;
        let cameraDirection = new THREE.Vector3();
        let cameraRight = new THREE.Vector3();
        
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (keyState.hasOwnProperty(key)) keyState[key] = true;
            // Prevenir scroll com setas
            if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight') e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key;
            if (keyState.hasOwnProperty(key)) keyState[key] = false;
        });
        
        // Raycaster para detectar cliques nos cristais
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            // Verificar colisão com os cristais (grupos)
            const clickableObjects = [];
            projectMeshes.forEach(p => {
                if (p.gemGroup) clickableObjects.push(p.gemGroup);
                if (p.ringObj) clickableObjects.push(p.ringObj);
            });
            const intersects = raycaster.intersectObjects(clickableObjects, true);
            if (intersects.length > 0) {
                let found = null;
                for (let obj of intersects) {
                    for (let proj of projectMeshes) {
                        if (obj.object === proj.gemGroup || obj.object.parent === proj.gemGroup || obj.object === proj.ringObj) {
                            found = proj;
                            break;
                        }
                    }
                    if (found) break;
                }
                if (found) {
                    const modal = document.getElementById('project-modal');
                    document.getElementById('project-title').innerHTML = found.title;
                    document.getElementById('project-desc').innerHTML = found.desc;
                    const linkEl = document.getElementById('project-link');
                    linkEl.href = found.link;
                    linkEl.target = "_blank";
                    modal.classList.add('show');
                }
            }
        });
        
        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('project-modal').classList.remove('show');
        });
        
        // Fechar modal clicando fora (opcional)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('project-modal').classList.remove('show');
            }
        });
        
        // --- LOOP DE ANIMAÇÃO E MOVIMENTAÇÃO ---
        let lastTime = performance.now();
        let cameraEuler = { yaw: -Math.PI / 4, pitch: 0 }; // orientação inicial
        let mouseX = 0, mouseY = 0;
        
        // Controle de olhar com mouse (first person look)
        document.body.style.cursor = 'grab';
        let isPointerLock = false;
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        document.addEventListener('pointerlockchange', lockChange);
        function lockChange() {
            if (document.pointerLockElement === renderer.domElement) {
                isPointerLock = true;
                document.body.style.cursor = 'none';
                document.addEventListener('mousemove', onMouseMove);
            } else {
                isPointerLock = false;
                document.body.style.cursor = 'grab';
                document.removeEventListener('mousemove', onMouseMove);
            }
        }
        
        function onMouseMove(e) {
            if (!isPointerLock) return;
            const sensitivity = 0.002;
            cameraEuler.yaw -= e.movementX * sensitivity;
            cameraEuler.pitch -= e.movementY * sensitivity;
            if (cameraEuler.pitch > Math.PI / 2.2) cameraEuler.pitch = Math.PI / 2.2;
            if (cameraEuler.pitch < -Math.PI / 2.2) cameraEuler.pitch = -Math.PI / 2.2;
        }
        
        function updateCameraRotation() {
            const euler = new THREE.Euler(cameraEuler.pitch, cameraEuler.yaw, 0, 'YXZ');
            camera.quaternion.setFromEuler(euler);
        }
        
        function updateMovement(deltaTime) {
            const speed = moveSpeed * deltaTime;
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(new THREE.Vector3(0, 1, 0), forward);
            right.normalize();
            
            let move = new THREE.Vector3(0, 0, 0);
            if (keyState['w'] || keyState['ArrowUp']) move.z -= 1;
            if (keyState['s'] || keyState['ArrowDown']) move.z += 1;
            if (keyState['d'] || keyState['ArrowRight']) move.x += 1;
            if (keyState['a'] || keyState['ArrowLeft']) move.x -= 1;
            move.normalize();
            
            let deltaPos = new THREE.Vector3();
            deltaPos.addScaledVector(forward, move.z * speed);
            deltaPos.addScaledVector(right, move.x * speed);
            
            // Colisão simples com limites do mapa
            let newPos = camera.position.clone().add(deltaPos);
            if (Math.abs(newPos.x) < 13 && Math.abs(newPos.z) < 12 && newPos.y > 0.5 && newPos.y < 4) {
                camera.position.add(deltaPos);
            }
            // Manter altura fixa (first person)
            camera.position.y = 1.8;
        }
        
        // Animações contínuas
        let time = 0;
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            if (delta > 0.01) {
                updateMovement(delta);
                updateCameraRotation();
            }
            
            time += 0.016;
            // Animar luzes e elementos
            fillLight.intensity = 0.5 + Math.sin(time * 1.5) * 0.2;
            blueLight.intensity = 0.6 + Math.sin(time * 1.2) * 0.3;
            backLight.intensity = 0.4 + Math.sin(time * 0.9) * 0.2;
            
            // Rotacionar anéis grandes
            bigRing.rotation.z += 0.008;
            bigRing2.rotation.z -= 0.005;
            
            // Animar cristais: partículas flutuantes ao redor
            projectMeshes.forEach(proj => {
                if (proj.particles) {
                    proj.particles.forEach((part, idx) => {
                        const data = part.userData;
                        if (data) {
                            const angle = data.angle + time * data.speed;
                            const xOff = Math.cos(angle) * data.radius;
                            const zOff = Math.sin(angle) * data.radius;
                            part.position.x = proj.position.x + xOff;
                            part.position.z = proj.position.z + zOff;
                            part.position.y = proj.position.y + Math.sin(time * 2 + idx) * 0.15 + data.yOffset;
                            // Mudar cor sutil
                            const hue = (time * 0.5 + idx) % 1;
                            if (part.material) part.material.emissiveIntensity = 0.5 + Math.sin(time * 3) * 0.3;
                        }
                    });
                }
                if (proj.ringObj) {
                    proj.ringObj.rotation.z += 0.02;
                }
                if (proj.gemGroup) {
                    proj.gemGroup.rotation.y += 0.01;
                    proj.gemGroup.position.y = proj.position.y + Math.sin(time * 2.5) * 0.03;
                }
            });
            
            // Partículas ambiente girando
            particleSystem.rotation.y += 0.002;
            particleSystem.rotation.x = Math.sin(time * 0.2) * 0.1;
            
            // Renderizar
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // Iniciar simulação
        animate();
        
        // Ajuste de janela
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Pequeno helper console
        console.log('✨ Portfólio 3D carregado! Use WASD para andar e clique nos cristais.');
    </script>
</body>
</html>
