<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ràvila Costa · Space Portfolio</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;cursor:none;}
 
  #c{position:fixed;inset:0;}
 
  /* HUD */
  #hud-name{
    position:fixed;top:24px;left:36px;
    font-size:22px;font-weight:900;
    color:#fff;letter-spacing:5px;text-transform:uppercase;
    text-shadow:0 0 18px #00f7ff,0 0 40px #00f7ff66;
    pointer-events:none;
  }
  #hud-sub{font-size:11px;color:#00f7ffaa;letter-spacing:5px;margin-top:3px;}
 
  #hud-github{
    position:fixed;top:24px;right:36px;
    color:#00f7ffcc;font-size:12px;letter-spacing:2px;
    text-decoration:none;
    border:1px solid #00f7ff44;
    border-radius:20px;padding:6px 16px;
    backdrop-filter:blur(8px);
    background:rgba(0,247,255,.06);
    transition:all .25s;
  }
  #hud-github:hover{background:rgba(0,247,255,.18);color:#fff;border-color:#00f7ff;}
 
  #controls{
    position:fixed;bottom:24px;left:24px;
    background:rgba(0,0,0,.6);border:1px solid rgba(0,247,255,.25);
    border-radius:14px;padding:14px 18px;backdrop-filter:blur(10px);
    color:#88aaff;font-size:11px;letter-spacing:1px;
  }
  #controls b{color:#fff;display:block;margin-bottom:8px;letter-spacing:2px;font-size:10px;}
  .key{display:inline-block;background:rgba(0,247,255,.12);border:1px solid rgba(0,247,255,.4);border-radius:4px;padding:1px 7px;color:#aaddff;margin-right:4px;}
 
  #radar{
    position:fixed;bottom:24px;right:24px;
    background:rgba(0,0,0,.6);border:1px solid rgba(0,247,255,.25);
    border-radius:14px;padding:14px 18px;backdrop-filter:blur(10px);
    font-size:10px;letter-spacing:2px;color:#fff;
  }
  #radar b{display:block;margin-bottom:8px;color:#fff;letter-spacing:2px;font-size:10px;}
  .rdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;vertical-align:middle;}
 
  #hint{
    position:fixed;bottom:50%;left:50%;transform:translate(-50%,50%);
    color:rgba(136,170,255,.9);font-size:13px;letter-spacing:3px;text-align:center;
    pointer-events:none;animation:fadeOut 5s ease forwards;
  }
  @keyframes fadeOut{0%,50%{opacity:1;}100%{opacity:0;}}
 
  /* Modal */
  #modal{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:300px;
    background:rgba(2,4,20,.96);
    border-radius:18px;padding:28px 24px;
    transition:transform .4s cubic-bezier(.34,1.56,.64,1);
    text-align:center;color:#fff;z-index:100;
    pointer-events:all;
  }
  #modal.open{transform:translate(-50%,-50%) scale(1);}
  #modal-icon{font-size:42px;margin-bottom:10px;}
  #modal-name{font-size:17px;font-weight:800;margin-bottom:6px;letter-spacing:1px;}
  #modal-desc{font-size:11px;color:#aaa;line-height:1.7;margin-bottom:14px;}
  #modal-tags{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
  .tag{border-radius:10px;padding:2px 10px;font-size:9px;font-weight:700;}
  #modal-btn{
    display:block;padding:10px 0;border-radius:20px;
    font-size:11px;font-weight:800;letter-spacing:1px;
    text-decoration:none;color:#000;transition:transform .2s,box-shadow .2s;
  }
  #modal-btn:hover{transform:scale(1.05);}
  #modal-close{
    position:absolute;top:12px;right:16px;
    background:none;border:none;color:#666;font-size:20px;cursor:pointer;
    transition:color .2s;
  }
  #modal-close:hover{color:#fff;}
 
  /* cursor */
  #cur{position:fixed;width:10px;height:10px;border-radius:50%;background:#00f7ff;box-shadow:0 0 10px #00f7ff;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
  #cur2{position:fixed;width:32px;height:32px;border-radius:50%;border:1px solid #00f7ff55;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .1s ease;}
 
  #loader{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .8s;}
  #loader.gone{opacity:0;pointer-events:none;}
  #loader-ring{width:60px;height:60px;border:3px solid #00f7ff22;border-top:3px solid #00f7ff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:18px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #loader p{color:#00f7ffaa;letter-spacing:4px;font-size:12px;}
 
  /* mobile */
  #mpad{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);gap:10px;z-index:200;}
  .mbtn{width:52px;height:52px;border-radius:50%;background:rgba(0,247,255,.12);border:1px solid #00f7ff44;color:#00f7ff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;}
  @media(max-width:640px){#mpad{display:flex;}#controls{display:none;}body{cursor:auto;}#cur,#cur2{display:none;}}
</style>
</head>
<body>
 
<div id="loader"><div id="loader-ring"></div><p>INICIANDO MISSÃO...</p></div>
 
<canvas id="c"></canvas>
 
<div id="cur"></div><div id="cur2"></div>
 
<div id="hud-name">Ràvila Costa<div id="hud-sub">Backend Developer · Space Portfolio</div></div>
<a id="hud-github" href="https://github.com/ravilacosta" target="_blank">github.com/ravilacosta ↗</a>
 
<div id="controls">
  <b>CONTROLES</b>
  <div style="margin-bottom:5px"><span class="key">W</span><span class="key">↑</span> Avançar</div>
  <div style="margin-bottom:5px"><span class="key">S</span><span class="key">↓</span> Recuar</div>
  <div style="margin-bottom:5px"><span class="key">A</span><span class="key">←</span> Esquerda</div>
  <div style="margin-bottom:5px"><span class="key">D</span><span class="key">→</span> Direita</div>
  <div><span class="key">SPACE</span> Pular</div>
</div>
 
<div id="radar">
  <b>PROJETOS</b>
  <div id="radar-list"></div>
</div>
 
<div id="hint">Use WASD · Aproxime-se dos planetas</div>
 
<div id="modal">
  <button id="modal-close">×</button>
  <div id="modal-icon">🪐</div>
  <div id="modal-name">Projeto</div>
  <div id="modal-desc">Descrição</div>
  <div id="modal-tags"></div>
  <a id="modal-btn" href="#" target="_blank">Ver no GitHub →</a>
</div>
 
<div id="mpad">
  <button class="mbtn" id="ml">◀</button>
  <button class="mbtn" id="mf">▲</button>
  <button class="mbtn" id="mb">▼</button>
  <button class="mbtn" id="mr">▶</button>
  <button class="mbtn" id="mj">⬆</button>
</div>
 
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
 
// ── DATA ─────────────────────────────────────────────────────
const PROJECTS = [
  { name:"Front Eventos", desc:"Interface frontend para gerenciamento e divulgação de eventos. Visual moderno e responsivo.", url:"https://github.com/ravilacosta/front-eventos", icon:"🎪", color:0xff6b35, hex:"#ff6b35", tech:["HTML","CSS","JavaScript"], radius:9, speed:0.007 },
  { name:"Shopee Clone",  desc:"Recriação da plataforma Shopee com e-commerce, listagem de produtos e carrinho de compras.", url:"https://github.com/ravilacosta/shopee",        icon:"🛍️", color:0xff3d3d, hex:"#ff3d3d", tech:["HTML","CSS","JavaScript"], radius:14, speed:0.005 },
  { name:"Loja Virtual",  desc:"Loja virtual completa com catálogo, páginas de produto e fluxo de compra integrado.",        url:"https://github.com/ravilacosta/loja-virtual", icon:"🏪", color:0xa855f7, hex:"#a855f7", tech:["HTML","CSS","JavaScript"], radius:19, speed:0.003 },
];
 
// ── SCENE ────────────────────────────────────────────────────
const scene    = new THREE.Scene();
scene.fog      = new THREE.FogExp2(0x000008, 0.012);
scene.background = new THREE.Color(0x000008);
 
const cam = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 600);
cam.position.set(0,3,10);
 
const renderer = new THREE.WebGLRenderer({ canvas:document.getElementById("c"), antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.shadowMap.enabled = true;
 
// ── LIGHTS ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x111133, 2));
const sun = new THREE.PointLight(0xffffff, 3, 200);
sun.position.set(0,0,0);
scene.add(sun);
const blue = new THREE.DirectionalLight(0x4466ff, 1);
blue.position.set(10,20,-10);
scene.add(blue);
 
// ── STARS ────────────────────────────────────────────────────
function starField(n, spread, sz, col){
  const geo = new THREE.BufferGeometry();
  const p   = new Float32Array(n*3);
  for(let i=0;i<n*3;i++) p[i]=(Math.random()-.5)*spread;
  geo.setAttribute("position",new THREE.BufferAttribute(p,3));
  return new THREE.Points(geo,new THREE.PointsMaterial({size:sz,color:col,transparent:true,opacity:.9,sizeAttenuation:true}));
}
scene.add(starField(5000,400,.18,0xffffff));
scene.add(starField(800,300,.35,0x88ddff));
scene.add(starField(300,200,.6,0xffcc66));
 
// ── GALAXY DISC ──────────────────────────────────────────────
{
  const geo = new THREE.BufferGeometry();
  const n=2000, p=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const r=10+Math.random()*60, a=Math.random()*Math.PI*2;
    p[i*3]=Math.cos(a)*r; p[i*3+1]=(Math.random()-.5)*3; p[i*3+2]=Math.sin(a)*r;
  }
  geo.setAttribute("position",new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.3,color:0x8844ff,transparent:true,opacity:.35})));
}
 
// ── SUN (central star) ───────────────────────────────────────
{
  const s = new THREE.Mesh(new THREE.SphereGeometry(1.8,32,32),
    new THREE.MeshStandardMaterial({color:0xffee66,emissive:0xffaa00,emissiveIntensity:3}));
  scene.add(s);
  const halo = new THREE.Mesh(new THREE.SphereGeometry(2.6,32,32),
    new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:.12,side:THREE.BackSide}));
  scene.add(halo);
}
 
// ── NEBULA PLANES ────────────────────────────────────────────
[
  [0x330066,.18, 0,3,-40, .2,.4,.1, 70,40],
  [0x660011,.14, 15,2,-50, .1,.3,.2, 55,30],
  [0x003366,.16,-10,5,-45, .15,.5,.1,60,35],
  [0x004422,.12, 8,-3,-38, .3,.2,.0, 45,25],
].forEach(([col,op, x,y,z, rx,ry,rz, w,h])=>{
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w,h),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op,side:THREE.DoubleSide,depthWrite:false})
  );
  m.position.set(x,y,z);
  m.rotation.set(rx,ry,rz);
  scene.add(m);
});
 
// ── ORBITAL RINGS (decoration) ───────────────────────────────
PROJECTS.forEach(proj=>{
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(proj.radius,.04,4,120),
    new THREE.MeshBasicMaterial({color:proj.color,transparent:true,opacity:.2})
  );
  ring.rotation.x = Math.PI/2;
  scene.add(ring);
});
 
// ── PLANETS ──────────────────────────────────────────────────
const planetGroups = [];
const planetMeshes = [];
 
PROJECTS.forEach((proj,i)=>{
  const group = new THREE.Group();
  scene.add(group);
 
  // procedural texture
  const tc = document.createElement("canvas");
  tc.width=512;tc.height=512;
  const ctx2=tc.getContext("2d");
  const c = new THREE.Color(proj.color);
  const gr = ctx2.createRadialGradient(200,180,10,256,256,256);
  gr.addColorStop(0,"#fff3");
  gr.addColorStop(.25,proj.hex);
  gr.addColorStop(.7,`hsl(${Math.round(c.getHSL({}).h*360)},50%,12%)`);
  gr.addColorStop(1,"#000");
  ctx2.fillStyle=gr; ctx2.fillRect(0,0,512,512);
  for(let b=0;b<10;b++){
    ctx2.strokeStyle=proj.hex+"55"; ctx2.lineWidth=6+Math.random()*18;
    ctx2.beginPath(); ctx2.moveTo(0,50+b*46);
    for(let x=0;x<=512;x+=15) ctx2.lineTo(x,50+b*46+Math.sin(x*.04+b)*20);
    ctx2.stroke();
  }
  const tex = new THREE.CanvasTexture(tc);
 
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(1.3+i*.15,64,64),
    new THREE.MeshStandardMaterial({map:tex,emissive:new THREE.Color(proj.color),emissiveIntensity:.3,roughness:.6,metalness:.3})
  );
  sphere.castShadow = true;
  sphere.userData = { proj, idx:i };
  group.add(sphere);
  planetMeshes.push(sphere);
 
  // atmosphere glow
  const atmo = new THREE.Mesh(
    new THREE.SphereGeometry((1.3+i*.15)*1.35,32,32),
    new THREE.MeshBasicMaterial({color:proj.color,transparent:true,opacity:.1,side:THREE.BackSide})
  );
  group.add(atmo);
 
  // rings for planet 0 and 2
  if(i!==1){
    const r1 = new THREE.Mesh(new THREE.TorusGeometry((1.3+i*.15)*1.9,.1,8,80),
      new THREE.MeshBasicMaterial({color:proj.color,transparent:true,opacity:.6}));
    r1.rotation.x=Math.PI/3.5;
    group.add(r1);
  }
 
  // glow light
  const pl = new THREE.PointLight(proj.color,2,15);
  group.add(pl);
 
  // sparkle particles
  const sg=new THREE.BufferGeometry(), sp=new Float32Array(60*3);
  for(let k=0;k<180;k++) sp[k]=(Math.random()-.5)*6;
  sg.setAttribute("position",new THREE.BufferAttribute(sp,3));
  group.add(new THREE.Points(sg,new THREE.PointsMaterial({size:.06,color:proj.color,transparent:true,opacity:.7})));
 
  planetGroups.push({ group, proj, sphere, atmo, pl, angle: (Math.PI*2/3)*i + Math.PI/6 });
});
 
// ── ASTEROID BELT ────────────────────────────────────────────
const asteroids=[];
for(let i=0;i<30;i++){
  const r=.06+Math.random()*.3;
  const m=new THREE.Mesh(
    new THREE.DodecahedronGeometry(r,0),
    new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(.08,.2,.25+Math.random()*.2),roughness:.9})
  );
  const a=Math.random()*Math.PI*2, dist=7+Math.random()*4;
  m.position.set(Math.cos(a)*dist, (Math.random()-.5)*2, Math.sin(a)*dist);
  m.userData={spin:(Math.random()-.5)*.03, floatOff:Math.random()*Math.PI*2};
  scene.add(m); asteroids.push(m);
}
 
// ── SHOOTING STARS ───────────────────────────────────────────
const shooters=[];
function spawnShooter(){
  const mat = new THREE.MeshBasicMaterial({color:0xffeedd,transparent:true,opacity:.9});
  const m = new THREE.Mesh(new THREE.CylinderGeometry(.025,.005,3.5,4),mat);
  m.position.set((Math.random()-.5)*80+cam.position.x,10+Math.random()*8,-20-Math.random()*30);
  m.rotation.z=Math.PI/2+.25;
  m.userData={vx:-.5-Math.random()*.3,vy:-.12,age:0,maxAge:1.8};
  scene.add(m); shooters.push(m);
}
setInterval(spawnShooter,2200);
 
// ── METEOR FIREBALLS ─────────────────────────────────────────
const meteors=[];
function spawnMeteor(){
  const g=new THREE.Group();
  const core=new THREE.Mesh(new THREE.SphereGeometry(.12,10,10),
    new THREE.MeshBasicMaterial({color:0xffffff}));
  const halo=new THREE.Mesh(new THREE.SphereGeometry(.28,10,10),
    new THREE.MeshStandardMaterial({color:0xff4400,emissive:0xff8800,emissiveIntensity:2,transparent:true,opacity:.7,depthWrite:false}));
  const outer=new THREE.Mesh(new THREE.SphereGeometry(.55,10,10),
    new THREE.MeshBasicMaterial({color:0xff2200,transparent:true,opacity:.2,depthWrite:false,side:THREE.BackSide}));
  g.add(core,halo,outer);
 
  // trail beads
  const trail=[];
  for(let i=0;i<18;i++){
    const s=1-i/18;
    const tb=new THREE.Mesh(new THREE.SphereGeometry(.1*s,6,6),
      new THREE.MeshBasicMaterial({color:i<6?0xffee00:i<12?0xff6600:0xff2200,transparent:true,opacity:.7*s,depthWrite:false}));
    scene.add(tb); trail.push(tb);
  }
  const light=new THREE.PointLight(0xff5500,4,8);
  g.add(light);
 
  g.position.set((Math.random()-.5)*60+cam.position.x, 5+Math.random()*10, -10-Math.random()*20);
  scene.add(g);
  const dir=new THREE.Vector3(-.9-Math.random()*.1,-.15,(Math.random()-.5)*.2).normalize();
  meteors.push({g,trail,dir,speed:.22+Math.random()*.15,age:0,maxAge:4,halo,outer,light,core});
}
setInterval(spawnMeteor,2800);
 
// ── ASTRONAUT ────────────────────────────────────────────────
let astro=null, mixer=null, walkAction=null;
const astroGroup=new THREE.Group();
scene.add(astroGroup);
astroGroup.position.set(0,.5,0);
 
// fallback shape
const fb=new THREE.Group();
const bodyFB=new THREE.Mesh(new THREE.CapsuleGeometry(.3,.55,8,16),new THREE.MeshStandardMaterial({color:0xddeeff,roughness:.5,metalness:.3}));
bodyFB.position.y=.3;
const helmFB=new THREE.Mesh(new THREE.SphereGeometry(.3,24,24),new THREE.MeshStandardMaterial({color:0xffffff,roughness:.2,metalness:.5}));
helmFB.position.y=1.05;
const visFB=new THREE.Mesh(new THREE.SphereGeometry(.22,24,24),new THREE.MeshStandardMaterial({color:0x00ddff,emissive:0x00aaff,emissiveIntensity:.8,transparent:true,opacity:.8,roughness:0,metalness:.9}));
visFB.position.set(.04,1.08,.12); visFB.scale.set(.9,1,.55);
const bpFB=new THREE.Mesh(new THREE.BoxGeometry(.3,.45,.13),new THREE.MeshStandardMaterial({color:0xaabbcc,roughness:.6}));
bpFB.position.set(0,.35,-.25);
[-1,1].forEach(sx=>{
  const arm=new THREE.Mesh(new THREE.CapsuleGeometry(.1,.35,6,10),new THREE.MeshStandardMaterial({color:0xddeeff,roughness:.5}));
  arm.position.set(sx*.4,.32,.04); arm.rotation.z=sx*.35; fb.add(arm);
  const leg=new THREE.Mesh(new THREE.CapsuleGeometry(.1,.38,6,10),new THREE.MeshStandardMaterial({color:0xddeeff,roughness:.5}));
  leg.position.set(sx*.15,-.28,0); fb.add(leg);
});
fb.add(bodyFB,helmFB,visFB,bpFB);
// visor light
const vl=new THREE.PointLight(0x00ddff,1.2,3); vl.position.set(0,1.1,.4); fb.add(vl);
astroGroup.add(fb);
fb.userData.visor=visFB; fb.userData.vlight=vl;
 
// load real model (graceful)
const glb=new GLTFLoader();
glb.load("https://modelviewer.dev/shared-assets/models/Astronaut.glb",gltf=>{
  fb.visible=false;
  const m=gltf.scene;
  m.scale.set(1,1,1);
  astro=m;
  astroGroup.add(m);
  if(gltf.animations.length){
    mixer=new THREE.AnimationMixer(m);
    walkAction=mixer.clipAction(gltf.animations[0]);
  }
},undefined,()=>{ /* fallback stays */ });
 
// ── INPUT ────────────────────────────────────────────────────
const keys={};
window.addEventListener("keydown",e=>{keys[e.code]=true;if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code))e.preventDefault();});
window.addEventListener("keyup",e=>{keys[e.code]=false;});
 
// mobile pad
document.getElementById("ml").addEventListener("touchstart",()=>keys["KeyA"]=true);
document.getElementById("ml").addEventListener("touchend",()=>keys["KeyA"]=false);
document.getElementById("mr").addEventListener("touchstart",()=>keys["KeyD"]=true);
document.getElementById("mr").addEventListener("touchend",()=>keys["KeyD"]=false);
document.getElementById("mf").addEventListener("touchstart",()=>keys["KeyW"]=true);
document.getElementById("mf").addEventListener("touchend",()=>keys["KeyW"]=false);
document.getElementById("mb").addEventListener("touchstart",()=>keys["KeyS"]=true);
document.getElementById("mb").addEventListener("touchend",()=>keys["KeyS"]=false);
document.getElementById("mj").addEventListener("touchstart",()=>keys["Space"]=true);
document.getElementById("mj").addEventListener("touchend",()=>keys["Space"]=false);
 
// ── PHYSICS ──────────────────────────────────────────────────
let vy=0; const GRAV=-.022, JUMP=.32, SPEED=.1, GROUND=.5;
let moving=false;
 
// ── RAYCASTER ────────────────────────────────────────────────
const ray=new THREE.Raycaster(), mouse2=new THREE.Vector2();
let modalOpen=false;
 
function openModal(proj,color){
  document.getElementById("modal").style.setProperty("border","2px solid "+color);
  document.getElementById("modal").style.setProperty("box-shadow","0 0 50px "+color+"55,inset 0 0 60px #0009");
  document.getElementById("modal-icon").textContent=proj.icon;
  document.getElementById("modal-name").textContent=proj.name;
  document.getElementById("modal-name").style.color=color;
  document.getElementById("modal-desc").textContent=proj.desc;
  const tags=document.getElementById("modal-tags");
  tags.innerHTML="";
  proj.tech.forEach(t=>{
    const s=document.createElement("span");
    s.className="tag";
    s.textContent=t;
    s.style.background=color+"22";
    s.style.border=`1px solid ${color}55`;
    s.style.color=color;
    tags.appendChild(s);
  });
  const btn=document.getElementById("modal-btn");
  btn.href=proj.url;
  btn.style.background=color;
  btn.style.boxShadow=`0 0 20px ${color}88`;
  document.getElementById("modal").classList.add("open");
  modalOpen=true;
}
 
window.addEventListener("click",e=>{
  if(modalOpen) return;
  mouse2.x=(e.clientX/innerWidth)*2-1;
  mouse2.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse2,cam);
  const hits=ray.intersectObjects(planetMeshes);
  if(hits.length){
    const d=hits[0].object.userData;
    openModal(d.proj,d.proj.hex);
  }
});
 
document.getElementById("modal-close").addEventListener("click",()=>{
  document.getElementById("modal").classList.remove("open");
  modalOpen=false;
});
document.getElementById("modal").addEventListener("click",e=>{
  if(e.target===document.getElementById("modal")){document.getElementById("modal").classList.remove("open");modalOpen=false;}
});
 
// ── CURSOR ───────────────────────────────────────────────────
const cur=document.getElementById("cur"),cur2=document.getElementById("cur2");
window.addEventListener("mousemove",e=>{
  cur.style.left=e.clientX+"px"; cur.style.top=e.clientY+"px";
  cur2.style.left=e.clientX+"px"; cur2.style.top=e.clientY+"px";
});
 
// ── RADAR ────────────────────────────────────────────────────
const radarList=document.getElementById("radar-list");
PROJECTS.forEach((p,i)=>{
  const div=document.createElement("div");
  div.id="ritem"+i;
  div.style.cssText="display:flex;align-items:center;margin-bottom:6px;font-size:10px;color:#555;transition:color .3s;";
  div.innerHTML=`<span class="rdot" style="background:${p.hex};box-shadow:none;" id="rdot${i}"></span>${p.icon} ${p.name}`;
  radarList.appendChild(div);
});
 
// ── CLOCK ────────────────────────────────────────────────────
const clock=new THREE.Clock();
let t=0;
 
// ── ANIMATE ──────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(); t+=dt;
 
  // astronaut movement
  const pos=astroGroup.position;
  moving=false;
  const target=astro||fb;
  if(!modalOpen){
    if(keys["KeyW"]||keys["ArrowUp"])   { pos.z-=SPEED; moving=true; astroGroup.rotation.y=Math.PI; }
    if(keys["KeyS"]||keys["ArrowDown"]) { pos.z+=SPEED; moving=true; astroGroup.rotation.y=0; }
    if(keys["KeyA"]||keys["ArrowLeft"]) { pos.x-=SPEED; moving=true; astroGroup.rotation.y=-Math.PI/2; }
    if(keys["KeyD"]||keys["ArrowRight"]){ pos.x+=SPEED; moving=true; astroGroup.rotation.y= Math.PI/2; }
    if((keys["Space"])&&pos.y<=GROUND+.02) vy=JUMP;
  }
 
  vy+=GRAV; pos.y+=vy;
  if(pos.y<GROUND){ pos.y=GROUND; vy=0; }
  pos.x=Math.max(-35,Math.min(35,pos.x));
  pos.z=Math.max(-35,Math.min(35,pos.z));
 
  // bob
  if(!moving) fb.position.y=Math.sin(t*1.5)*.05;
  // visor pulse
  if(fb.userData.visor){
    fb.userData.visor.material.emissiveIntensity=.7+Math.sin(t*4)*.2;
    fb.userData.vlight.intensity=1+Math.sin(t*4)*.4;
  }
 
  // walk animation
  if(mixer){ mixer.update(dt); if(walking!==moving){ walking=moving; walkAction&&(moving?walkAction.play():walkAction.stop()); } }
 
  // camera follow
  cam.position.x+=(pos.x - cam.position.x)*.07;
  cam.position.y+=(pos.y+3.5 - cam.position.y)*.07;
  cam.position.z+=(pos.z+8  - cam.position.z)*.07;
  cam.lookAt(pos.x,pos.y+1,pos.z);
 
  // planets orbit
  planetGroups.forEach((pg,i)=>{
    pg.angle+=pg.proj.speed;
    pg.group.position.x=Math.cos(pg.angle)*pg.proj.radius;
    pg.group.position.z=Math.sin(pg.angle)*pg.proj.radius;
    pg.group.position.y=Math.sin(t*.4+i)*0.5;
    pg.group.children[0].rotation.y+=dt*.3;
 
    // proximity
    const dx=pg.group.position.x-pos.x, dz=pg.group.position.z-pos.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    const near=dist<4;
    pg.pl.intensity=near?5:2;
    (pg.atmo.material).opacity=near?.22:.08;
 
    // radar update
    const rdot=document.getElementById("rdot"+i);
    const ri=document.getElementById("ritem"+i);
    if(rdot&&ri){
     rdot.style.boxShadow = near ? `0 0 8px ${pg.proj.hex}` : "none";
      ri.style.color=near?pg.proj.hex:"#555";
      ri.style.fontWeight=near?"700":"400";
    }
  });
 
  // asteroids
  asteroids.forEach(a=>{
    a.rotation.x+=dt*a.userData.spin;
    a.rotation.y+=dt*a.userData.spin*.7;
    a.position.y+=Math.sin(t+a.userData.floatOff)*.003;
  });
 
  // shooting stars
  for(let i=shooters.length-1;i>=0;i--){
    const s=shooters[i];
    s.userData.age+=dt;
    s.position.x+=s.userData.vx;
    s.position.y+=s.userData.vy;
    s.material.opacity=Math.max(0,.9*(1-s.userData.age/s.userData.maxAge));
    if(s.userData.age>s.userData.maxAge){scene.remove(s);shooters.splice(i,1);}
  }
 
  // meteors
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    m.age+=dt;
    m.g.position.addScaledVector(m.dir,m.speed);
    const p=m.g.position.clone();
    const pulse=1+Math.sin(m.age*18)*.2;
    m.core.scale.setScalar(pulse);
    m.halo.material.emissiveIntensity=1.8+Math.sin(m.age*12)*.6;
    m.outer.material.opacity=.12+Math.sin(m.age*9)*.06;
    m.light.intensity=3+Math.sin(m.age*15)*1.5;
    // update trail
    m.trail.forEach((tb,ti)=>{
      const back=new THREE.Vector3().copy(m.dir).multiplyScalar(-(ti+1)*.28);
      tb.position.copy(p).add(back);
      tb.material.opacity=Math.max(0,.7*(1-ti/m.trail.length)*(1-m.age/m.maxAge));
    });
    if(m.age>m.maxAge||m.g.position.x<-60){
      scene.remove(m.g); m.trail.forEach(tb=>scene.remove(tb)); meteors.splice(i,1);
    }
  }
 
  renderer.render(scene,cam);
}
 
let walking=false;
animate();
 
// ── LOADER HIDE ──────────────────────────────────────────────
setTimeout(()=>document.getElementById("loader").classList.add("gone"),1200);
 
window.addEventListener("resize",()=>{
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
