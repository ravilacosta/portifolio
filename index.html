
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ràvila Costa — Space Portfolio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  overflow:hidden;
  font-family:'Orbitron',sans-serif;
}

#hud{
  position:fixed;
  top:20px;
  left:30px;
  color:#00f7ff;
  text-shadow:0 0 20px #00f7ff;
  z-index:10;
}

#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

#modal.active{
  opacity:1;
  pointer-events:all;
}

#modal-box{
  background:#000;
  border:1px solid #00f7ff;
  padding:30px;
  width:320px;
  text-align:center;
}
</style>
</head>

<body>

<div id="hud">
  <h1>RÀVILA COSTA</h1>
  <span>SPACE PORTFOLIO</span>
</div>

<div id="modal">
  <div id="modal-box">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <a id="link" target="_blank">VER PROJETO</a>
  </div>
</div>

<canvas id="c"></canvas>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { EffectComposer } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js";
import { RenderPass } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js";

// DATA
const PROJECTS=[
 {name:"Front Eventos",desc:"Sistema moderno",url:"https://github.com/",color:0xff3d7f,x:6},
 {name:"Shopee Clone",desc:"E-commerce",url:"https://github.com/",color:0x7c3aed,x:12},
 {name:"Loja Virtual",desc:"Plataforma",url:"https://github.com/",color:0xff6b35,x:18}
];

// SETUP
const canvas=document.getElementById("c");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,500);
camera.position.set(0,2,10);

// BLOOM
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));

const bloom=new UnrealBloomPass(
 new THREE.Vector2(innerWidth,innerHeight),
 1.5,
 0.4,
 0.85
);
composer.addPass(bloom);

// LIGHT
scene.add(new THREE.AmbientLight(0x222244,1));
const light=new THREE.PointLight(0x00f7ff,3,50);
light.position.set(-5,5,-5);
scene.add(light);

// STARS
function stars(n){
 const geo=new THREE.BufferGeometry();
 const pos=new Float32Array(n*3);
 for(let i=0;i<n*3;i++) pos[i]=(Math.random()-0.5)*400;
 geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
 return new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:0.7}));
}
scene.add(stars(3000));

// PLANETS
const meshes=[];
PROJECTS.forEach(p=>{
 const m=new THREE.Mesh(
  new THREE.SphereGeometry(1.5,64,64),
  new THREE.MeshStandardMaterial({
   color:p.color,
   emissive:p.color,
   emissiveIntensity:1.5
  })
 );
 m.position.x=p.x;
 scene.add(m);
 meshes.push(m);
});

// ASTRONAUTA
const astronaut=new THREE.Group();

const body=new THREE.Mesh(
 new THREE.CylinderGeometry(.4,.5,1.3,32),
 new THREE.MeshStandardMaterial({color:0xffffff})
);
astronaut.add(body);

const head=new THREE.Mesh(
 new THREE.SphereGeometry(.5,32,32),
 new THREE.MeshStandardMaterial({color:0xffffff})
);
head.position.y=1;
astronaut.add(head);

scene.add(astronaut);

// MOVIMENTO
let targetX=0;
addEventListener("keydown",e=>{
 if(e.code==="ArrowRight")targetX+=2;
 if(e.code==="ArrowLeft")targetX-=2;
});

// CLICK PLANET
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();

addEventListener("click",e=>{
 mouse.x=(e.clientX/innerWidth)*2-1;
 mouse.y=-(e.clientY/innerHeight)*2+1;

 ray.setFromCamera(mouse,camera);
 const hits=ray.intersectObjects(meshes);

 if(hits.length){
   const i=meshes.indexOf(hits[0].object);
   openModal(PROJECTS[i]);
 }
});

function openModal(p){
 document.getElementById("modal").classList.add("active");
 document.getElementById("title").textContent=p.name;
 document.getElementById("desc").textContent=p.desc;
 document.getElementById("link").href=p.url;
}

document.getElementById("modal").onclick=()=>{
 document.getElementById("modal").classList.remove("active");
};

// ANIMATE
function animate(){
 requestAnimationFrame(animate);

 astronaut.position.x += (targetX - astronaut.position.x)*0.05;
 camera.position.x += (astronaut.position.x - camera.position.x)*0.05;

 meshes.forEach(m=>m.rotation.y+=0.01);

 composer.render();
}
animate();

// RESIZE
addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
